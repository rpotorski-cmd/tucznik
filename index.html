          })}
          {clientList.length===0&&<tr><td colSpan={7} style={{padding:30,textAlign:'center'}}>
            <div style={{fontSize:24,marginBottom:8}}>🔍</div>
            <div style={{fontSize:13,color:'var(--mut)',fontWeight:600}}>Nie znaleziono klienta „{search}"</div>
          </td></tr>}
        </tbody>
      </table>
    </Card>

    <div style={{fontSize:9,color:'var(--mut)',marginTop:8,textAlign:'center'}}>
      AUTO = automatyczne przypisanie na podstawie historii (WBC→WR, Żywa→TK) · RĘCZNY = przypisanie ręczne nadpisuje automatyczne · Kliknij WR/TK aby zmienić kategorię
    </div>
  </div>;
}

function App(){
  const today=new Date();
  // ═══ API LOADING STATE ═══
  const [apiLoaded,setApiLoaded]=React.useState(false);
  const [apiError,setApiError]=React.useState(null);

  // Load from API on mount
  React.useEffect(()=>{
    async function loadAPI(){
      try {
        await initKabanekAPI();
        setApiLoaded(true);
        document.getElementById('api-loading').style.display='none';
        document.getElementById('api-status').style.display='block';
      } catch(err) {
        setApiError(err.message);
        document.getElementById('api-status').className='api-status error';
        document.getElementById('api-status').textContent='🔴 API Error';
      }
    }
    loadAPI();
  },[]);

  // ═══ STATE FROM API ═══
  const [sales,setSales]=React.useState(()=>window.__KABANEK_DATA__.sales);
  const [mon,setMon]=React.useState(getMon(today));
  const [plans,setPlans]=React.useState(()=>window.__KABANEK_DATA__.plans);
  const [reported,setReported]=React.useState(()=>window.__KABANEK_DATA__.reported);
  const [tab,setTab]=React.useState('plan');
  const [period,setPeriod]=React.useState('week');
  const [person,setPerson]=React.useState('Wszyscy');
  const [trCost,setTrCost]=React.useState(0.12);
  const [mCost,setMCost]=React.useState(0.05);
  const [cat,setCat]=React.useState('all');
  const [clientDb,setClientDb]=React.useState(()=>window.__KABANEK_DATA__.clientDb);

  // Sync clientDb changes to localStorage (plans/reported stay local for now)
  React.useEffect(()=>{
    if(apiLoaded){
      localStorage.setItem('plans',JSON.stringify(plans));
    }
  },[plans,apiLoaded]);

  React.useEffect(()=>{
    if(apiLoaded){
      localStorage.setItem('reported',JSON.stringify(reported));
    }
  },[reported,apiLoaded]);

  // ═══ MODIFIED ADD/DELETE FUNCTIONS WITH API ═══
  const addSale=async (rec)=>{
    try {
      const newSale = await api.createSale(rec);
      setSales(prev=>[...prev,newSale]);
      console.log('✅ Sale added:', newSale);
    } catch(err) {
      console.error('❌ Failed to add sale:', err);
      alert('Błąd zapisywania sprzedaży: ' + err.message);
    }
  };

  const deleteSale=async (id)=>{
    try {
      await api.deleteSale(id);
      setSales(prev=>prev.filter(s=>s.id!==id));
      console.log('✅ Sale deleted:', id);
    } catch(err) {
      console.error('❌ Failed to delete sale:', err);
      alert('Błąd usuwania sprzedaży: ' + err.message);
    }
  };

  const addDelivery=async (rec)=>{
    try {
      const newDel = await api.createDelivery(rec);
      // Note: deliveries aren't in main state, this is for future enhancement
      console.log('✅ Delivery added:', newDel);
    } catch(err) {
      console.error('❌ Failed to add delivery:', err);
      alert('Błąd zapisywania dostawy: ' + err.message);
    }
  };

  const deleteDelivery=async (id)=>{
    try {
      await api.deleteDelivery(id);
      console.log('✅ Delivery deleted:', id);
    } catch(err) {
      console.error('❌ Failed to delete delivery:', err);
      alert('Błąd usuwania dostawy: ' + err.message);
    }
  };


// OLD VERSION REMOVED - using async addSale above

  const isCur=period==='week'?fmt(getMon(today))===fmt(mon):period==='month'?mon.getMonth()===today.getMonth()&&mon.getFullYear()===today.getFullYear():mon.getFullYear()===today.getFullYear();
  const lbl=period==='week'?{m:MS[mon.getMonth()]+' '+mon.getFullYear(),s:mon.getDate()+'–'+addD(mon,6).getDate()+' '+MS_S[addD(mon,6).getMonth()]}:period==='month'?{m:MS[mon.getMonth()]+' '+mon.getFullYear(),s:'Cały miesiąc'}:{m:'Rok '+mon.getFullYear(),s:'Styczeń – Grudzień'};
  const [start,end]=getRange(mon,period);

  /* helper: get effective category for a client */
  const getClientCat=(clientName)=>{
    const cl=clientName.toUpperCase().trim();
    if(clientDb[cl])return clientDb[cl];
    return null; // will fall back to sale's own cat
  };

  const filtered=React.useMemo(()=>{
    let s=sales.filter(s=>s.d>=start&&s.d<=end);
    if(person!=='Wszyscy')s=s.filter(x=>x.pe===person||x.pe.includes(person));
    if(cat!=='all')s=s.filter(x=>{
      const effCat=getClientCat(x.c)||x.cat||'TK';
      return effCat===cat;
    });
    return s;
  },[start,end,person,sales,cat,clientDb]);

  const tR=filtered.reduce((a,s)=>a+s.q,0);
  const nav=dir=>setMon(p=>{
    if(period==='week')return addD(p,dir*7);
    if(period==='month')return new Date(p.getFullYear(),p.getMonth()+dir,1);
    return new Date(p.getFullYear()+dir,0,1);
  });
  const goT=()=>{if(period==='week')setMon(getMon(today));else if(period==='month')setMon(new Date(today.getFullYear(),today.getMonth(),1));else setMon(new Date(today.getFullYear(),0,1));};

  const filteredAll=React.useMemo(()=>{
    let s=sales;
    if(person!=='Wszyscy')s=s.filter(x=>x.pe===person||x.pe.includes(person));
    if(cat!=='all')s=s.filter(x=>{
      const effCat=getClientCat(x.c)||x.cat||'TK';
      return effCat===cat;
    });
    return s;
  },[sales,cat,person,clientDb]);

  const calcZApp=(x)=>{
    if(!(x.cz>0&&x.cr>0&&x.cr<50))return null;
    const trKg2=x.isZ?0:trCost;
    const fp=x.cz*0.001;
    const fo=x.cz*0.00125;
    return x.cz-x.cr-trKg2-fp-fo;
  };
  const emptyP=()=>({q:0,cnt:0,kg:0,zysk:0,cntZ:0,cntOk:0,cntLoss:0,sprzR:0,sprzZ:0,costTr:0,costFP:0,costFO:0});
  const addToP=(r,s,kg,z)=>{
    r.q+=s.q;r.cnt++;r.kg+=kg;
    if(s.cr>0)r.sprzR+=s.cr*kg;
    if(s.cz>0)r.sprzZ+=s.cz*kg;
    const trKg2=s.isZ?0:trCost;
    r.costTr+=trKg2*kg;
    if(s.cz>0){r.costFP+=s.cz*0.001*kg;r.costFO+=s.cz*0.00125*kg;}
    if(z!==null){r.cntZ++;r.zysk+=z*kg;if(z>=0)r.cntOk++;else r.cntLoss++;}
  };
  const pStats=React.useMemo(()=>{
    const allP=sales.filter(s=>s.d>=start&&s.d<=end&&(cat==='all'||(getClientCat(s.c)||s.cat||'TK')===cat));
    const m={};allP.forEach(s=>{
      const kg=s.kg||s.q*130;
      const z=calcZApp(s);
      const ps=s.pe.includes('/')?s.pe.split('/'):s.pe?[s.pe]:[];
      ps.forEach(p=>{const k=p.trim();if(!m[k])m[k]=emptyP();addToP(m[k],s,kg,z);});
      if(s.pe.includes('/')){if(!m['M/K'])m['M/K']=emptyP();addToP(m['M/K'],s,kg,z);}
    });
    const tot=emptyP();
    allP.forEach(s=>{const kg=s.kg||s.q*130;const z=calcZApp(s);addToP(tot,s,kg,z);});
    m.__TOT__=tot;
    return m;
  },[start,end,sales,cat,trCost,clientDb]);

  // Show loading screen while API loads
  if(!apiLoaded){
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>🐷</div>
        <div style={{fontSize:18,fontWeight:800,color:'var(--g)'}}>Ładowanie danych...</div>
        {apiError&&<div style={{marginTop:12,color:'var(--r)',fontSize:12}}>{apiError}</div>}
      </div>
    </div>;
  }

  return<div style={{minHeight:'100vh',background:'var(--bg)'}}>
    {/* ═══ HEADER ═══ */}
    <div style={{background:'linear-gradient(135deg, #1a5c28 0%, #2d7a3a 40%, #3a8f48 100%)',padding:'0',position:'sticky',top:0,zIndex:100,boxShadow:'0 4px 20px rgba(0,0,0,.15)'}}>
      {/* Top row: Logo + Tabs */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 20px 8px',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{background:'rgba(255,255,255,.15)',borderRadius:10,padding:4,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <img src={window.__LOGO__} style={{height:34,filter:'brightness(1.1)'}} alt="K"/>
          </div>
          <div>
            <h1 style={{fontSize:18,fontWeight:900,color:'#fff',margin:0,letterSpacing:'.5px',textShadow:'0 1px 3px rgba(0,0,0,.2)'}}>KABANEK <span style={{color:'#f0d78c',fontWeight:900}}>PLANER</span></h1>
            <div style={{fontSize:8,color:'rgba(255,255,255,.55)',letterSpacing:'.5px'}}>{sales.length} transakcji · v6</div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:3,background:'rgba(0,0,0,.2)',borderRadius:10,padding:4}}>
          {[['baza','📋 Baza'],['plan','📋 Planer'],['zglos','📝 Zgłoszone'],['sales','📊 Sprzedaż'],['done','💰 Wynik']].map(([k,l])=>{
            const isAct=tab===k;
            return<button key={k} onClick={()=>setTab(k)} style={{padding:'7px 14px',borderRadius:7,border:'none',fontSize:11,fontWeight:isAct?800:600,background:isAct?'rgba(255,255,255,.95)':'transparent',color:isAct?'var(--gd)':'rgba(255,255,255,.7)',transition:'all .2s ease',letterSpacing:isAct?'.3px':'0',cursor:'pointer'}} onMouseEnter={e=>{if(!isAct)e.target.style.background='rgba(255,255,255,.12)'}} onMouseLeave={e=>{if(!isAct)e.target.style.background='transparent'}}>{l}</button>;
          })}
        </div>
      </div>

      {/* Bottom row: Filters + Navigation */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 20px 10px',flexWrap:'wrap',gap:6,borderTop:'1px solid rgba(255,255,255,.1)'}}>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {/* Period */}
          {tab!=='plan'&&tab!=='zglos'&&tab!=='baza'&&<div style={{display:'flex',gap:2,background:'rgba(0,0,0,.15)',borderRadius:7,padding:3}}>
            {[['week','Tydzień'],['month','Miesiąc'],['year','Rok']].map(([k,l])=>{
              const isAct=period===k;
              return<button key={k} onClick={()=>setPeriod(k)} style={{padding:'5px 12px',borderRadius:5,border:'none',fontSize:10,fontWeight:isAct?800:600,background:isAct?'#f0d78c':'transparent',color:isAct?'#5a4520':'rgba(255,255,255,.65)',transition:'all .2s',cursor:'pointer'}} onMouseEnter={e=>{if(!isAct)e.target.style.background='rgba(255,255,255,.1)'}} onMouseLeave={e=>{if(!isAct)e.target.style.background='transparent'}}>{l}</button>;
            })}
          </div>}

          {/* Person */}
          <div style={{display:'flex',gap:2,background:'rgba(0,0,0,.15)',borderRadius:7,padding:3}}>
            {['Wszyscy','Marek','Klaudia','Marek/Klaudia'].map(p=>{
              const isAct=person===p;
              const pColors={'Wszyscy':'rgba(255,255,255,.9)','Marek':'#64b5f6','Klaudia':'#f48fb1','Marek/Klaudia':'#ce93d8'};
              return<button key={p} onClick={()=>setPerson(p)} style={{padding:'5px 11px',borderRadius:5,border:'none',fontSize:10,fontWeight:isAct?800:600,background:isAct?(pColors[p]||'#fff'):'transparent',color:isAct?'#1a1a1a':'rgba(255,255,255,.65)',transition:'all .2s',cursor:'pointer'}} onMouseEnter={e=>{if(!isAct)e.target.style.background='rgba(255,255,255,.1)'}} onMouseLeave={e=>{if(!isAct)e.target.style.background='transparent'}}>{p==='Wszyscy'?'👥 Wszyscy':p==='Marek/Klaudia'?'M/K':'👤 '+p}</button>;
            })}
          </div>

          {/* TK/WR */}
          <div style={{display:'flex',gap:2,background:'rgba(0,0,0,.15)',borderRadius:7,padding:3}}>
            {[['all','Wszystko'],['TK','🐷 TK'],['WR','🐽 WR']].map(([k,l])=>{
              const isAct=cat===k;
              const catColors={'all':'rgba(255,255,255,.9)','TK':'#a1887f','WR':'#ffab91'};
              return<button key={k} onClick={()=>setCat(k)} style={{padding:'5px 11px',borderRadius:5,border:'none',fontSize:10,fontWeight:isAct?800:600,background:isAct?(catColors[k]||'#fff'):'transparent',color:isAct?'#1a1a1a':'rgba(255,255,255,.65)',transition:'all .2s',cursor:'pointer'}} onMouseEnter={e=>{if(!isAct)e.target.style.background='rgba(255,255,255,.1)'}} onMouseLeave={e=>{if(!isAct)e.target.style.background='transparent'}}>{l}</button>;
            })}
          </div>
        </div>

        {/* Nav */}
        {tab!=='plan'&&tab!=='zglos'&&tab!=='baza'&&<div style={{display:'flex',alignItems:'center',gap:6}}>
          <button onClick={()=>nav(-1)} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:6,color:'#fff',padding:'5px 10px',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.target.style.background='rgba(255,255,255,.22)'} onMouseLeave={e=>e.target.style.background='rgba(255,255,255,.12)'}>◀</button>
          <div style={{textAlign:'center',minWidth:130}}>
            <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{lbl.m}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.5)'}}>{ lbl.s}</div>
          </div>
          <button onClick={()=>nav(1)} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:6,color:'#fff',padding:'5px 10px',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.target.style.background='rgba(255,255,255,.22)'} onMouseLeave={e=>e.target.style.background='rgba(255,255,255,.12)'}>▶</button>
          {!isCur&&<button onClick={goT} style={{background:'#f0d78c',border:'none',borderRadius:5,color:'#5a4520',padding:'5px 12px',fontSize:10,fontWeight:800,cursor:'pointer',boxShadow:'0 2px 6px rgba(0,0,0,.15)',transition:'all .2s'}}>Dziś</button>}
        </div>}
      </div>
    </div>

    {/* ═══ CONTENT ═══ */}
    <div style={{padding:'12px 8px',maxWidth:"100%",margin:"0 auto"}}>

      {/* Person stat cards — not on Planer (has own nav) */}
      {tab!=='plan'&&tab!=='zglos'&&tab!=='baza'&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:8,marginBottom:12}}>
        {['Marek','Klaudia','M/K'].map(p=>{
          const s=pStats[p]||emptyP();
          const col=p==='M/K'?'#7b1fa2':(PE_COL[p]||'var(--g)');
          const filterVal=p==='M/K'?'Marek/Klaudia':p;
          const avgZkg=s.kg>0?s.zysk/s.kg:0;
          const premiaLabel=p==='M/K'?'PREMIA M/K':'PREMIA '+p.toUpperCase();
          return<Card key={p} onClick={()=>setPerson(person===filterVal?'Wszyscy':filterVal)} style={{padding:'10px 14px',cursor:'pointer',borderLeft:'3px solid '+col,opacity:person!=='Wszyscy'&&person!==filterVal?.4:1,transition:'opacity .2s'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:700,color:col}}>👤 {p==='M/K'?'M/K wspólne':p}</span>
              <span style={{fontSize:9,color:'var(--mut)'}}>{s.cnt} tr. · {fN(s.q)} szt. · {fN(Math.round(s.kg))} kg</span>
            </div>
            {s.cntZ>0&&<div style={{fontSize:9,display:'flex',flexDirection:'column',gap:1}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'#1565c0',fontWeight:600}}>🏭 Zakład</span>
                <span className="m" style={{fontWeight:700,color:'#1565c0'}}>{fN(Math.round(s.sprzZ))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 🧑‍🌾 Rolnik</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.sprzR))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 🚛 Transport</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costTr))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 📉 F.prom. 0,1%</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costFP))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 📉 F.ochr. 0,125%</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costFO))} zł</span>
              </div>
              <div style={{height:1,background:'var(--brd)',margin:'3px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'2px 0'}}>
                <span style={{fontWeight:800,fontSize:10,color:s.zysk>=0?'var(--g)':'var(--r)'}}>💰 {premiaLabel}</span>
                <span className="m" style={{fontSize:15,fontWeight:900,color:s.zysk>=0?'var(--g)':'var(--r)'}}>{s.zysk>=0?'+':''}{fN(Math.round(s.zysk))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:4,fontSize:8}}>
                  <span style={{color:'var(--g)',fontWeight:700}}>▲{s.cntOk}</span>
                  <span style={{color:'var(--r)',fontWeight:700}}>▼{s.cntLoss}</span>
                </div>
                <span className="m" style={{fontSize:10,fontWeight:700,color:avgZkg>=0?'var(--g)':'var(--r)'}}>{avgZkg>=0?'+':''}{avgZkg.toFixed(3)} zł/kg</span>
              </div>
            </div>}
          </Card>;
        })}
        {(()=>{
          const s=pStats.__TOT__||emptyP();
          const avgZkg=s.kg>0?s.zysk/s.kg:0;
          return<Card style={{padding:'10px 14px',borderLeft:'3px solid var(--g)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--g)'}}>📊 RAZEM</span>
              <span style={{fontSize:9,color:'var(--mut)'}}>{s.cnt} tr. · {fN(s.q)} szt. · {fN(Math.round(s.kg))} kg</span>
            </div>
            {s.cntZ>0&&<div style={{fontSize:9,display:'flex',flexDirection:'column',gap:1}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'#1565c0',fontWeight:600}}>🏭 Zakład</span>
                <span className="m" style={{fontWeight:700,color:'#1565c0'}}>{fN(Math.round(s.sprzZ))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 🧑‍🌾 Rolnik</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.sprzR))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 🚛 Transport</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costTr))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 📉 F.prom. 0,1%</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costFP))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--mut)'}}>− 📉 F.ochr. 0,125%</span>
                <span className="m" style={{fontWeight:700,color:'var(--r)'}}>−{fN(Math.round(s.costFO))} zł</span>
              </div>
              <div style={{height:1,background:'var(--brd)',margin:'3px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'2px 0'}}>
                <span style={{fontWeight:800,fontSize:10,color:s.zysk>=0?'var(--g)':'var(--r)'}}>💰 PREMIA RAZEM</span>
                <span className="m" style={{fontSize:15,fontWeight:900,color:s.zysk>=0?'var(--g)':'var(--r)'}}>{s.zysk>=0?'+':''}{fN(Math.round(s.zysk))} zł</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:4,fontSize:8}}>
                  <span style={{color:'var(--g)',fontWeight:700}}>▲{s.cntOk}</span>
                  <span style={{color:'var(--r)',fontWeight:700}}>▼{s.cntLoss}</span>
                </div>
                <span className="m" style={{fontSize:10,fontWeight:700,color:avgZkg>=0?'var(--g)':'var(--r)'}}>{avgZkg>=0?'+':''}{avgZkg.toFixed(3)} zł/kg</span>
              </div>
            </div>}
          </Card>;
        })()}
      </div>}

      {/* Transport settings (for Wynik finansowy) */}
      {tab==='done'&&<Card style={{padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <div>
          <span style={{fontSize:10,fontWeight:700,color:'var(--a)'}}>🚛 Transport zewn.:</span>
          <div style={{display:'flex',gap:3,marginTop:3}}>
            {[0.05,0.08,0.10,0.12,0.15,0.20,0.25,0.30].map(v=>
              <button key={v} onClick={()=>setTrCost(v)} style={{padding:'3px 8px',borderRadius:4,border:'none',fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:trCost===v?'var(--a)':'var(--bg)',color:trCost===v?'#fff':'var(--mut)'}}>{v.toFixed(2)}</button>
            )}<span style={{fontSize:9,color:'var(--mut)',alignSelf:'center'}}>zł/kg</span>
          </div>
        </div>
        <div style={{width:1,height:28,background:'var(--brd)'}}/>
        <div>
          <span style={{fontSize:10,fontWeight:700,color:'var(--r)'}}>🔴 Mariusz J.:</span>
          <div style={{display:'flex',gap:3,marginTop:3}}>
            {[0,0.03,0.05,0.08,0.10,0.15].map(v=>
              <button key={v} onClick={()=>setMCost(v)} style={{padding:'3px 8px',borderRadius:4,border:'none',fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:mCost===v?'var(--r)':'var(--bg)',color:mCost===v?'#fff':'var(--mut)'}}>{v.toFixed(2)}</button>
            )}<span style={{fontSize:9,color:'var(--mut)',alignSelf:'center'}}>zł/kg</span>
          </div>
        </div>
        <div style={{fontSize:9,color:'var(--mut)',flex:1,minWidth:180}}>
          <div><b>Zysk/kg</b> = cena zakł. − cena roln. − transport − fund.prom.(0,1%) − fund.ochr.roln.(0,125%) − premia handl.(zł/szt)</div>
        </div>
      </Card>}

      {/* Tab content */}
      {tab==='baza'&&<ClientDatabase allSales={sales} clientDb={clientDb} setClientDb={setClientDb}/>}
      {tab==='plan'&&<Planner allSales={filteredAll} plans={plans} setPlans={setPlans}/>}
      {tab==='zglos'&&<ReportedSales allSales={sales} reported={reported} setReported={setReported} clientDb={clientDb}/>}
      {tab==='sales'&&<>
        <SalesView allSales={filtered} gran={period} trCost={trCost}/>
        <div style={{marginTop:16}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--gd)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
            <span style={{background:'var(--gd)',color:'#fff',borderRadius:6,padding:'3px 10px',fontSize:11}}>📝 LISTA TRANSAKCJI</span>
            <span style={{fontSize:10,color:'var(--mut)',fontWeight:600}}>{filtered.length} transakcji</span>
          </div>
          <Card style={{padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
            <div>
              <span style={{fontSize:10,fontWeight:700,color:'var(--a)'}}>🚛 Transport zewn.:</span>
              <div style={{display:'flex',gap:3,marginTop:3}}>
                {[0.05,0.08,0.10,0.12,0.15,0.20,0.25,0.30].map(v=>
                  <button key={v} onClick={()=>setTrCost(v)} style={{padding:'3px 8px',borderRadius:4,border:'none',fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:trCost===v?'var(--a)':'var(--bg)',color:trCost===v?'#fff':'var(--mut)'}}>{v.toFixed(2)}</button>
                )}<span style={{fontSize:9,color:'var(--mut)',alignSelf:'center'}}>zł/kg</span>
              </div>
            </div>
            <div style={{width:1,height:28,background:'var(--brd)'}}/>
            <div style={{fontSize:9,color:'var(--mut)',flex:1,minWidth:180}}>
              <div><b>Zysk/kg</b> = cena zakł. − cena roln. − transport − fund.prom.(0,1%) − fund.ochr.roln.(0,125%) − premia handl.(zł/szt)</div>
            </div>
          </Card>
          <TxList sales={filtered} trCost={trCost} allSales={sales} onAdd={addSale} clientDb={clientDb}/>
        </div>
      </>}
      {tab==='done'&&<>
        <SalesView allSales={filtered} gran={period} trCost={trCost}/>
        <div style={{marginTop:16}}/>
        <TxList sales={filtered} trCost={trCost} clientDb={clientDb}/>
      </>}

      <div style={{textAlign:'center',padding:'16px 0',opacity:.2}}>
        <img src={window.__LOGO__} style={{height:18}} alt=""/>
        <div style={{fontSize:7,color:'var(--mut)',marginTop:2}}>KABANEK</div>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
