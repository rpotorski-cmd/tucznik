/* ════════════════════════════════════════════════════════
   GENERATOR FV — FV Sprzedaż / VAT RR / VAT → Comarch
   ════════════════════════════════════════════════════════ */
const FIRMS_PRESET=[
  {name:'KABANEK SP. Z O.O.',nip:'',addr:'',city:'',zip:'',bank:'',konto:''},
  {name:'NATURAL PIG SP. Z O.O.',nip:'',addr:'',city:'',zip:'',bank:'',konto:''}
];

function InvoiceGen({sales,periodLabel}){
  const [open,setOpen]=React.useState(false);
  const [fvType,setFvType]=React.useState('zakl'); // zakl, rr, vat
  const [firmIdx,setFirmIdx]=React.useState(0);
  const [firma,setFirma]=React.useState({...FIRMS_PRESET[0]});
  const [selTarget,setSelTarget]=React.useState(null); // ubojnia or client name
  const [checked,setChecked]=React.useState({}); // {id: true/false} plain object
  const [rolnik,setRolnik]=React.useState({name:'',pesel:'',nip:'',addr:'',city:'',zip:'',dowod:''});
  const [nabywca,setNabywca]=React.useState({name:'',nip:'',addr:'',city:'',zip:''});
  const [fvNum,setFvNum]=React.useState('');
  const [fvDate,setFvDate]=React.useState(fmt(new Date()));
  const [sellDate,setSellDate]=React.useState('');
  const [payDays,setPayDays]=React.useState(14);
  const [vatRate,setVatRate]=React.useState('zw');
  const [itemName,setItemName]=React.useState('Żywiec wieprzowy — tuczniki');
  const [currency,setCurrency]=React.useState('PLN'); // PLN or EUR

  const pickFirm=(idx)=>{setFirmIdx(idx);setFirma({...FIRMS_PRESET[idx]});};
  const updF=(k,v)=>setFirma(p=>({...p,[k]:v}));
  const updR=(k,v)=>setRolnik(p=>({...p,[k]:v}));
  const updN=(k,v)=>setNabywca(p=>({...p,[k]:v}));
  const curSym=currency==='EUR'?'€':'zł';

  /* select target + auto-check all its items */
  const pickTarget=(name,items)=>{
    if(selTarget===name){setSelTarget(null);setChecked({});return;}
    setSelTarget(name);
    const m={};items.forEach(s=>{m[s.id]=true;});
    setChecked(m);
    setCurrency(name.toUpperCase().includes('BIOVELA')?'EUR':'PLN');
  };

  const toggleId=(id)=>setChecked(p=>{const n={...p};n[id]=!n[id];return n;});
  const checkedCount=Object.values(checked).filter(Boolean).length;
  const isChecked=(id)=>!!checked[id];

  /* reset on type change */
  const changeType=(t)=>{setFvType(t);setSelTarget(null);setChecked({});setCurrency('PLN');
    if(t==='rr'){setVatRate('7');setItemName('Żywiec wieprzowy — tuczniki (skup od rolnika ryczałtowego)');}
    else if(t==='vat'){setVatRate('zw');setItemName('Żywiec wieprzowy — tuczniki');}
    else{setVatRate('zw');setItemName('Żywiec wieprzowy — tuczniki');}
  };

  /* group by ubojnia */
  const byUb=React.useMemo(()=>{
    const m={};
    sales.forEach(s=>{
      if(!m[s.s])m[s.s]={items:[],totalKg:0,totalVal:0,totalValR:0,cnt:0};
      const kg=s.kg||s.q*130;
      m[s.s].items.push(s);
      m[s.s].totalKg+=kg;
      m[s.s].totalVal+=(s.cz||0)*kg;
      m[s.s].totalValR+=(s.cr||0)*kg;
      m[s.s].cnt+=1;
    });
    return m;
  },[sales]);
  const ubList=Object.keys(byUb).sort((a,b)=>byUb[b].totalVal-byUb[a].totalVal);

  /* group by client (for VAT RR & VAT) */
  const byCl=React.useMemo(()=>{
    const m={};
    sales.forEach(s=>{
      const cl=s.c.toUpperCase().trim();
      if(!m[cl])m[cl]={items:[],totalKg:0,totalValR:0,totalValZ:0,cnt:0};
      const kg=s.kg||s.q*130;
      m[cl].items.push(s);
      m[cl].totalKg+=kg;
      m[cl].totalValR+=(s.cr||0)*kg;
      m[cl].totalValZ+=(s.cz||0)*kg;
      m[cl].cnt+=1;
    });
    return m;
  },[sales]);
  const clList=Object.keys(byCl).sort((a,b)=>byCl[b].totalValR-byCl[a].totalValR);

  /* selected data — all items for target */
  const allTargetItems=fvType==='zakl'?(selTarget&&byUb[selTarget]?byUb[selTarget]:null)
    :(selTarget&&byCl[selTarget]?byCl[selTarget]:null);

  /* filtered to only checked items */
  const selData=React.useMemo(()=>{
    if(!allTargetItems)return null;
    const items=allTargetItems.items.filter(s=>!!checked[s.id]);
    if(items.length===0)return null;
    let totalKg=0,totalVal=0,totalValR=0;
    items.forEach(s=>{const kg=s.kg||s.q*130;totalKg+=kg;totalVal+=(s.cz||0)*kg;totalValR+=(s.cr||0)*kg;});
    return{items,totalKg,totalVal,totalValR,totalValZ:totalVal,cnt:items.length};
  },[allTargetItems,checked]);

  /* price field: zakl uses cz, rr/vat uses cr */
  const priceField=fvType==='zakl'?'cz':'cr';
  const totalVal=selData?(fvType==='zakl'?selData.totalVal:selData.totalValR):0;

  /* ── Comarch XML export ── */
  const exportComarch=()=>{
    if(!selData||!selTarget||checkedCount===0)return;
    const payDate=new Date(fvDate);payDate.setDate(payDate.getDate()+payDays);
    const payDateStr=fmt(payDate);
    const sd=sellDate||fvDate;
    const vrNum=vatRate==='zw'?0:parseInt(vatRate);

    let pozycjeXml='';
    let sumNetto=0;
    selData.items.forEach((s,i)=>{
      const kg=s.kg||s.q*130;
      const cena=s[priceField]||0;
      const netto=Math.round(cena*kg*100)/100;
      sumNetto+=netto;
      const vat=vatRate==='zw'?0:Math.round(netto*vrNum/100*100)/100;
      const brutto=netto+vat;
      const opis=fvType==='zakl'?`Klient: ${s.c} | ${s.d} | ${s.t} | ${s.q} szt. | ${kg} kg`
        :`Ubojnia: ${s.s} | ${s.d} | ${s.t} | ${s.q} szt. | ${kg} kg`;
      pozycjeXml+=`
      <POZYCJA>
        <LP>${i+1}</LP>
        <NAZWA_TOWARU>${itemName}</NAZWA_TOWARU>
        <OPIS>${opis}</OPIS>
        <ILOSC>${kg}</ILOSC>
        <JM>kg</JM>
        <CENA_NETTO>${cena.toFixed(2)}</CENA_NETTO>
        <WARTOSC_NETTO>${netto.toFixed(2)}</WARTOSC_NETTO>
        <STAWKA_VAT>${vatRate==='zw'?'zw':vatRate}</STAWKA_VAT>
        <WARTOSC_VAT>${vat.toFixed(2)}</WARTOSC_VAT>
        <WARTOSC_BRUTTO>${brutto.toFixed(2)}</WARTOSC_BRUTTO>
      </POZYCJA>`;
    });

    const totalNetto=Math.round(sumNetto*100)/100;
    const totalVat=vatRate==='zw'?0:Math.round(totalNetto*vrNum/100*100)/100;
    const totalBrutto=totalNetto+totalVat;

    /* Determine sprzedawca/nabywca based on type */
    let sprzedawcaXml,nabywcaXml,typDoc,rejestr,prefix,fvTypLabel;
    if(fvType==='zakl'){
      typDoc='302';rejestr='SPRZEDAZ';prefix='FS';fvTypLabel='FV_SPRZEDAZ';
      sprzedawcaXml=`<NAZWA>${firma.name}</NAZWA><NIP>${firma.nip}</NIP><ULICA>${firma.addr}</ULICA><KOD_POCZTOWY>${firma.zip}</KOD_POCZTOWY><MIASTO>${firma.city}</MIASTO>`;
      nabywcaXml=`<NAZWA>${selTarget}</NAZWA><NIP></NIP>`;
    } else if(fvType==='rr'){
      typDoc='303';rejestr='ZAKUP_VAT_RR';prefix='RR';fvTypLabel='FV_VAT_RR';
      /* W VAT RR: nabywca=firma, dostawca=rolnik */
      sprzedawcaXml=`<NAZWA>${rolnik.name||selTarget}</NAZWA><NIP>${rolnik.nip}</NIP><PESEL>${rolnik.pesel}</PESEL><DOWOD_OSOBISTY>${rolnik.dowod}</DOWOD_OSOBISTY><ULICA>${rolnik.addr}</ULICA><KOD_POCZTOWY>${rolnik.zip}</KOD_POCZTOWY><MIASTO>${rolnik.city}</MIASTO>`;
      nabywcaXml=`<NAZWA>${firma.name}</NAZWA><NIP>${firma.nip}</NIP><ULICA>${firma.addr}</ULICA><KOD_POCZTOWY>${firma.zip}</KOD_POCZTOWY><MIASTO>${firma.city}</MIASTO>`;
    } else {
      typDoc='302';rejestr='SPRZEDAZ';prefix='FV';fvTypLabel='FV_VAT';
      sprzedawcaXml=`<NAZWA>${firma.name}</NAZWA><NIP>${firma.nip}</NIP><ULICA>${firma.addr}</ULICA><KOD_POCZTOWY>${firma.zip}</KOD_POCZTOWY><MIASTO>${firma.city}</MIASTO>`;
      nabywcaXml=`<NAZWA>${nabywca.name||selTarget}</NAZWA><NIP>${nabywca.nip}</NIP><ULICA>${nabywca.addr}</ULICA><KOD_POCZTOWY>${nabywca.zip}</KOD_POCZTOWY><MIASTO>${nabywca.city}</MIASTO>`;
    }

    const rootTag=fvType==='rr'?'REJESTRY_ZAKUPOW_VAT':'REJESTRY_SPRZEDAZY_VAT';
    const itemTag=fvType==='rr'?'REJESTR_ZAKUPU_VAT':'REJESTR_SPRZEDAZY_VAT';

    const xml=`<?xml version="1.0" encoding="UTF-8"?>
<ROOT xmlns="http://www.comarch.pl/cdn/optima/offline">
  <${rootTag}>
    <${itemTag}>
      <MODUL>Handel</MODUL>
      <TYP>${typDoc}</TYP>
      <REJESTR>${rejestr}</REJESTR>
      <NUMER_PELNY>${fvNum||prefix+'/---'}</NUMER_PELNY>
      <RODZAJ_DOKUMENTU>${fvType==='rr'?'Faktura VAT RR':fvType==='vat'?'Faktura VAT':'Faktura sprzedaży'}</RODZAJ_DOKUMENTU>
      <DATA_WYSTAWIENIA>${fvDate}</DATA_WYSTAWIENIA>
      <DATA_SPRZEDAZY>${sd}</DATA_SPRZEDAZY>
      <TERMIN_PLATNOSCI>${payDateStr}</TERMIN_PLATNOSCI>
      <FORMA_PLATNOSCI>przelew</FORMA_PLATNOSCI>
      <KOREKTA>Nie</KOREKTA>
      <NOTKA>${fvType==='rr'?'Faktura VAT RR - zakup od rolnika ryczałtowego':''}</NOTKA>
      <WALUTA>${currency}</WALUTA>

      <SPRZEDAWCA>
        ${sprzedawcaXml}
      </SPRZEDAWCA>

      <NABYWCA>
        ${nabywcaXml}
      </NABYWCA>

      <POZYCJE>${pozycjeXml}
      </POZYCJE>

      <PLATNOSCI>
        <PLATNOSC>
          <TERMIN>${payDateStr}</TERMIN>
          <FORMA>przelew</FORMA>
          <KWOTA>${totalBrutto.toFixed(2)}</KWOTA>
        </PLATNOSC>
      </PLATNOSCI>

      <SUMY>
        <SUMA_NETTO>${totalNetto.toFixed(2)}</SUMA_NETTO>
        <SUMA_VAT>${totalVat.toFixed(2)}</SUMA_VAT>
        <SUMA_BRUTTO>${totalBrutto.toFixed(2)}</SUMA_BRUTTO>
      </SUMY>
    </${itemTag}>
  </${rootTag}>
</ROOT>`;

    const blob=new Blob([xml],{type:'application/xml;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${fvTypLabel}_${selTarget.replace(/[^a-zA-Z0-9]/g,'_')}_${fvDate}.xml`;
    a.click();
    URL.revokeObjectURL(url);
  };

  /* ── Closed state ── */
  if(!open)return<div style={{marginBottom:12}}>
    <button onClick={()=>setOpen(true)} style={{padding:'10px 20px',background:'linear-gradient(135deg,#1565c0,#0d47a1)',border:'none',borderRadius:8,
      color:'#fff',fontSize:13,fontWeight:800,cursor:'pointer',boxShadow:'0 2px 10px rgba(21,101,192,.3)',display:'flex',alignItems:'center',gap:8}}>
      📄 Generuj fakturę → Comarch
    </button>
  </div>;

  const iS={width:'100%',padding:'8px 10px',border:'1px solid var(--brd)',borderRadius:6,fontSize:12,fontFamily:'inherit',background:'#fff',outline:'none'};
  const lS={fontSize:9,fontWeight:700,color:'var(--mut)',display:'block',marginBottom:3,textTransform:'uppercase',letterSpacing:.5};
  const stepBadge=(n)=>({background:accentCol,color:'#fff',borderRadius:'50%',width:22,height:22,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900});
  const accentCol=fvType==='rr'?'#2e7d32':fvType==='vat'?'#e65100':'#1565c0';
  const accentBg=fvType==='rr'?'#e8f5e9':fvType==='vat'?'#fff3e0':'#e3f2fd';
  const accentGrad=fvType==='rr'?'linear-gradient(135deg,#2e7d32,#1b5e20)':fvType==='vat'?'linear-gradient(135deg,#e65100,#bf360c)':'linear-gradient(135deg,#1565c0,#0d47a1)';

  /* ── Preview table (shared) ── */
  const PreviewTable=()=>{
    if(!allTargetItems)return null;
    const allItems=allTargetItems.items;
    const checkedItems=allItems.filter(s=>isChecked(s.id));
    const vrNum=vatRate==='zw'?0:parseInt(vatRate);
    const totSzt=checkedItems.reduce((a,s)=>a+s.q,0);
    const totKg=checkedItems.reduce((a,s)=>a+(s.kg||s.q*130),0);
    const totWartR=checkedItems.reduce((a,s)=>a+((s.cr||0)*(s.kg||s.q*130)),0);
    const totWartZ=checkedItems.reduce((a,s)=>a+((s.cz||0)*(s.kg||s.q*130)),0);
    const fvVal=fvType==='zakl'?totWartZ:totWartR;
    const fvVat=vatRate==='zw'?0:Math.round(fvVal*vrNum/100*100)/100;
    const allChecked=allItems.length>0&&allItems.every(s=>isChecked(s.id));
    const toggleAll2=()=>{const m={};if(!allChecked)allItems.forEach(s=>{m[s.id]=true;});setChecked(m);};
    return<Card style={{padding:0,marginBottom:12,border:'1px solid '+accentCol+'40'}}>
      <div style={{background:accentBg,padding:'8px 14px',fontSize:11,fontWeight:800,color:accentCol,display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:6,alignItems:'center'}}>
        <span>📋 POZYCJE FV — <b>{checkedItems.length}</b> z {allItems.length} zaznaczonych · {fN(totSzt)} szt. · {fN(totKg)} kg</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span>🧑‍🌾 {fN(Math.round(totWartR))} {curSym} · 🏭 {fN(Math.round(totWartZ))} {curSym}</span>
          <div style={{display:'flex',gap:2,marginLeft:8}}>
            {['PLN','EUR'].map(c=>
              <button key={c} onClick={()=>setCurrency(c)}
                style={{padding:'2px 8px',borderRadius:4,border:'none',fontSize:10,fontWeight:800,
                  background:currency===c?accentCol:'#fff',color:currency===c?'#fff':accentCol,cursor:'pointer'}}>
                {c}
              </button>
            )}
          </div>
        </div>
      </div>
      <div style={{overflowX:'auto',maxHeight:400,overflowY:'auto'}}>
        <table style={{width:'100%',minWidth:950,borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#fafaf8'}}>
              <Th style={{width:32,textAlign:'center'}}>
                <input type="checkbox" checked={allChecked} onChange={toggleAll2}
                  style={{width:15,height:15,cursor:'pointer',accentColor:accentCol}}/>
              </Th>
              <Th style={{width:30,textAlign:'center'}}>LP</Th>
              <Th>Data</Th>
              <Th>{fvType==='zakl'?'Klient':'Ubojnia'}</Th>
              <Th style={{textAlign:'center'}}>Typ</Th>
              <Th style={{textAlign:'center'}}>Szt.</Th>
              <Th style={{textAlign:'right'}}>Kg</Th>
              <Th style={{textAlign:'right',background:'#fffdf5'}}>🧑‍🌾 Cena</Th>
              <Th style={{textAlign:'right',background:'#fffdf5'}}>🧑‍🌾 Wartość</Th>
              <Th style={{textAlign:'right',background:'#f7faff'}}>🏭 Cena</Th>
              <Th style={{textAlign:'right',background:'#f7faff'}}>🏭 Wartość</Th>
              <Th style={{textAlign:'right',background:accentBg,fontWeight:800}}>FV Netto</Th>
              {vatRate!=='zw'&&<Th style={{textAlign:'right'}}>VAT {vatRate}%</Th>}
              {vatRate!=='zw'&&<Th style={{textAlign:'right',fontWeight:800}}>Brutto</Th>}
            </tr>
          </thead>
          <tbody>
            {allItems.map((s,i)=>{
              const isSel=isChecked(s.id);
              const kg=s.kg||s.q*130;
              const wartR=Math.round((s.cr||0)*kg*100)/100;
              const wartZ=Math.round((s.cz||0)*kg*100)/100;
              const netto=fvType==='zakl'?wartZ:wartR;
              const vat=vatRate==='zw'?0:Math.round(netto*vrNum/100*100)/100;
              return<tr key={s.id} style={{borderBottom:'1px solid #f0f0f0',opacity:isSel?1:0.4,background:isSel?'':'#f5f5f5'}}>
                <Td style={{textAlign:'center'}}>
                  <input type="checkbox" checked={isSel} onChange={()=>toggleId(s.id)}
                    style={{width:15,height:15,cursor:'pointer',accentColor:accentCol}}/>
                </Td>
                <Td className="m" style={{textAlign:'center',fontSize:9,color:'var(--mut)'}}>{i+1}</Td>
                <Td className="m" style={{fontSize:11}}>{s.d}</Td>
                <Td style={{fontWeight:600,fontSize:11}}>{fvType==='zakl'?cap(s.c):s.s}</Td>
                <Td style={{textAlign:'center'}}><Badge bg={s.t==='WBC'?'var(--bl)':'var(--gl)'} color={s.t==='WBC'?'var(--b)':'var(--g)'}>{s.t}</Badge></Td>
                <Td className="m" style={{textAlign:'center',fontWeight:700}}>{s.q}</Td>
                <Td className="m" style={{textAlign:'right',fontWeight:600}}>{fN(kg)}</Td>
                <Td className="m" style={{textAlign:'right',color:'var(--a)',background:'#fffdf5'}}>{s.cr>0?fP(s.cr):'—'}</Td>
                <Td className="m" style={{textAlign:'right',fontWeight:700,color:'var(--a)',background:'#fffdf5'}}>{wartR>0?fN(wartR):'—'}</Td>
                <Td className="m" style={{textAlign:'right',color:'var(--b)',background:'#f7faff'}}>{s.cz>0?fP(s.cz):'—'}</Td>
                <Td className="m" style={{textAlign:'right',fontWeight:700,color:'var(--b)',background:'#f7faff'}}>{wartZ>0?fN(wartZ):'—'}</Td>
                <Td className="m" style={{textAlign:'right',fontWeight:800,color:isSel?accentCol:'#ccc',background:accentBg,fontSize:12}}>{fN(netto)} {curSym}</Td>
                {vatRate!=='zw'&&<Td className="m" style={{textAlign:'right',color:'var(--mut)'}}>{fN(vat)} {curSym}</Td>}
                {vatRate!=='zw'&&<Td className="m" style={{textAlign:'right',fontWeight:700}}>{fN(netto+vat)} {curSym}</Td>}
              </tr>;
            })}
          </tbody>
          <tfoot>
            <tr style={{background:accentBg,fontWeight:800}}>
              <td style={{padding:'8px',textAlign:'center',fontSize:9,color:accentCol}}>{checkedItems.length}✓</td>
              <td colSpan={4} style={{padding:'8px 10px',fontSize:11,color:accentCol,textAlign:'right'}}>RAZEM (zaznaczone):</td>
              <td className="m" style={{padding:'8px',textAlign:'center',fontSize:11,color:accentCol}}>{fN(totSzt)}</td>
              <td className="m" style={{padding:'8px',textAlign:'right',fontSize:11,color:accentCol}}>{fN(totKg)}</td>
              <td style={{padding:'8px'}}></td>
              <td className="m" style={{padding:'8px',textAlign:'right',fontSize:11,color:'var(--a)',background:'#fffdf5'}}>{fN(Math.round(totWartR))} {curSym}</td>
              <td style={{padding:'8px'}}></td>
              <td className="m" style={{padding:'8px',textAlign:'right',fontSize:11,color:'var(--b)',background:'#f7faff'}}>{fN(Math.round(totWartZ))} {curSym}</td>
              <td className="m" style={{padding:'8px',textAlign:'right',fontSize:14,color:accentCol,fontWeight:900}}>{fN(Math.round(fvVal))} {curSym}</td>
              {vatRate!=='zw'&&<td className="m" style={{padding:'8px',textAlign:'right',fontSize:11,color:'var(--mut)'}}>{fN(Math.round(fvVat))} {curSym}</td>}
              {vatRate!=='zw'&&<td className="m" style={{padding:'8px',textAlign:'right',fontSize:14,color:accentCol,fontWeight:900}}>{fN(Math.round(fvVal+fvVat))} {curSym}</td>}
            </tr>
          </tfoot>
        </table>
      </div>
    </Card>;
  };

  return<Card style={{marginBottom:14,border:'2px solid '+accentCol,overflow:'hidden'}}>
    <div style={{background:accentGrad,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{color:'#fff',fontWeight:800,fontSize:14,display:'flex',alignItems:'center',gap:8}}>
        📄 GENERATOR FAKTUR
        {fvType==='rr'&&' — VAT RR (rolnik)'}
        {fvType==='vat'&&' — FAKTURA VAT'}
        {fvType==='zakl'&&' — FV DLA ZAKŁADU'}
      </div>
      <button onClick={()=>setOpen(false)} style={{background:'#fff3',border:'none',borderRadius:4,color:'#fff',padding:'3px 10px',fontSize:12,fontWeight:800,cursor:'pointer'}}>✕ Zamknij</button>
    </div>

    {/* ── Type tabs ── */}
    <div style={{display:'flex',gap:0,borderBottom:'2px solid var(--brd)'}}>
      {[['zakl','🏭 FV Sprzedaż (zakład)','#1565c0'],['rr','🧑‍🌾 FV VAT RR (rolnik)','#2e7d32'],['vat','📋 FV VAT','#e65100']].map(([k,l,c])=>
        <button key={k} onClick={()=>changeType(k)}
          style={{flex:1,padding:'12px 8px',border:'none',borderBottom:fvType===k?'3px solid '+c:'3px solid transparent',
            background:fvType===k?c+'12':'#fff',color:fvType===k?c:'var(--mut)',
            fontSize:12,fontWeight:800,cursor:'pointer',transition:'all .15s'}}>
          {l}
        </button>
      )}
    </div>

    <div style={{padding:'16px 20px'}}>

      {/* ═══ STEP 1: Nasza firma ═══ */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:800,color:accentCol,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={stepBadge(1)}>1</span>
          {fvType==='rr'?'NABYWCA (NASZA FIRMA)':'SPRZEDAWCA (NASZA FIRMA)'}
        </div>
        <div style={{display:'flex',gap:4,marginBottom:10}}>
          {FIRMS_PRESET.map((s,i)=>
            <button key={i} onClick={()=>pickFirm(i)}
              style={{padding:'8px 16px',borderRadius:6,border:firmIdx===i?'2px solid '+accentCol:'2px solid var(--brd)',
                background:firmIdx===i?accentBg:'#fff',color:firmIdx===i?accentCol:'var(--mut)',
                fontSize:11,fontWeight:800,cursor:'pointer',transition:'all .15s'}}>
              {s.name}
            </button>
          )}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 180px',gap:10,marginBottom:6}}>
          <div><label style={lS}>Nazwa firmy</label><input value={firma.name} onChange={e=>updF('name',e.target.value)} style={iS}/></div>
          <div><label style={lS}>NIP</label><input value={firma.nip} onChange={e=>updF('nip',e.target.value)} placeholder="000-000-00-00" style={iS}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 140px',gap:10,marginBottom:6}}>
          <div><label style={lS}>Ulica i nr</label><input value={firma.addr} onChange={e=>updF('addr',e.target.value)} placeholder="ul. Przykładowa 1" style={iS}/></div>
          <div><label style={lS}>Kod pocztowy</label><input value={firma.zip} onChange={e=>updF('zip',e.target.value)} placeholder="00-000" style={iS}/></div>
          <div><label style={lS}>Miasto</label><input value={firma.city} onChange={e=>updF('city',e.target.value)} placeholder="Warszawa" style={iS}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><label style={lS}>Bank</label><input value={firma.bank} onChange={e=>updF('bank',e.target.value)} placeholder="np. PKO BP" style={iS}/></div>
          <div><label style={lS}>Nr konta</label><input value={firma.konto} onChange={e=>updF('konto',e.target.value)} placeholder="00 0000 0000 0000 0000 0000 0000" style={iS}/></div>
        </div>
      </div>

      {/* ═══ STEP 2: Kontrahent ═══ */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:800,color:accentCol,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={stepBadge(2)}>2</span>
          {fvType==='zakl'?'NABYWCA (ZAKŁAD / UBOJNIA)':fvType==='rr'?'DOSTAWCA (ROLNIK)':'NABYWCA (KLIENT)'}
          <span style={{fontSize:10,fontWeight:600,color:'var(--mut)',marginLeft:6}}>— {periodLabel}</span>
        </div>

        {fvType==='zakl'&&<>
          {ubList.length===0?<div style={{fontSize:12,color:'var(--mut)'}}>Brak transakcji w wybranym okresie</div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:6}}>
            {ubList.map(ub=>{
              const d=byUb[ub];const sel=selTarget===ub;
              return<div key={ub} onClick={()=>pickTarget(ub,d.items)}
                style={{padding:'10px 14px',borderRadius:8,border:sel?'2px solid '+accentCol:'1px solid var(--brd)',
                  background:sel?accentBg:'#fff',cursor:'pointer',transition:'all .15s'}}>
                <div style={{fontSize:12,fontWeight:800,color:sel?accentCol:'var(--txt)'}}>{ub}{ub.toUpperCase().includes('BIOVELA')&&<span style={{marginLeft:4,padding:'1px 5px',borderRadius:3,background:'#ffd600',color:'#5d4037',fontSize:8,fontWeight:900}}>€ EUR</span>}</div>
                <div style={{fontSize:10,color:'var(--mut)',marginTop:3,display:'flex',gap:8,flexWrap:'wrap'}}>
                  <span>{d.cnt} tr.</span>
                  <span>{d.items.reduce((a,s)=>a+s.q,0)} szt.</span>
                  <span className="m" style={{fontWeight:700}}>{fN(d.totalKg)} kg</span>
                </div>
                <div style={{fontSize:10,marginTop:2,display:'flex',gap:8}}>
                  {(()=>{const sym=ub.toUpperCase().includes('BIOVELA')?'€':'zł'; return<>
                  <span className="m" style={{fontWeight:700,color:'var(--a)'}}><span style={{fontSize:8}}>🧑‍🌾</span> {fN(Math.round(d.totalValR))} {sym}</span>
                  <span className="m" style={{fontWeight:700,color:'var(--b)'}}><span style={{fontSize:8}}>🏭</span> {fN(Math.round(d.totalVal))} {sym}</span>
                  </>;})()}
                </div>
              </div>;
            })}
          </div>}
        </>}

        {(fvType==='rr'||fvType==='vat')&&<>
          {clList.length===0?<div style={{fontSize:12,color:'var(--mut)'}}>Brak transakcji w wybranym okresie</div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:6,marginBottom:10}}>
            {clList.map(cl=>{
              const d=byCl[cl];const sel=selTarget===cl;
              return<div key={cl} onClick={()=>{pickTarget(cl,d.items);if(selTarget!==cl)updR('name',cap(cl));}}
                style={{padding:'10px 14px',borderRadius:8,border:sel?'2px solid '+accentCol:'1px solid var(--brd)',
                  background:sel?accentBg:'#fff',cursor:'pointer',transition:'all .15s'}}>
                <div style={{fontSize:12,fontWeight:800,color:sel?accentCol:'var(--txt)'}}>{cl}{cl.toUpperCase().includes('BIOVELA')&&<span style={{marginLeft:4,padding:'1px 5px',borderRadius:3,background:'#ffd600',color:'#5d4037',fontSize:8,fontWeight:900}}>€ EUR</span>}</div>
                <div style={{fontSize:10,color:'var(--mut)',marginTop:3,display:'flex',gap:8,flexWrap:'wrap'}}>
                  <span>{d.cnt} tr.</span>
                  <span>{d.items.reduce((a,s)=>a+s.q,0)} szt.</span>
                  <span className="m" style={{fontWeight:700}}>{fN(d.totalKg)} kg</span>
                </div>
                <div style={{fontSize:10,marginTop:2,display:'flex',gap:8}}>
                  <span className="m" style={{fontWeight:700,color:'var(--a)'}}><span style={{fontSize:8}}>🧑‍🌾</span> {fN(Math.round(d.totalValR))} zł</span>
                  <span className="m" style={{fontWeight:700,color:'var(--b)'}}><span style={{fontSize:8}}>🏭</span> {fN(Math.round(d.totalValZ))} zł</span>
                </div>
              </div>;
            })}
          </div>}

          {/* Rolnik details for VAT RR */}
          {fvType==='rr'&&selTarget&&<Card style={{padding:14,marginTop:8,border:'1px solid #a5d6a7',background:'#f1f8e9'}}>
            <div style={{fontSize:11,fontWeight:800,color:'#2e7d32',marginBottom:8}}>🧑‍🌾 DANE ROLNIKA RYCZAŁTOWEGO</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 160px 160px',gap:10,marginBottom:6}}>
              <div><label style={lS}>Imię i nazwisko / Nazwa</label><input value={rolnik.name} onChange={e=>updR('name',e.target.value)} style={iS}/></div>
              <div><label style={lS}>PESEL</label><input value={rolnik.pesel} onChange={e=>updR('pesel',e.target.value)} placeholder="00000000000" style={iS}/></div>
              <div><label style={lS}>Nr dowodu osobistego</label><input value={rolnik.dowod} onChange={e=>updR('dowod',e.target.value)} placeholder="ABC 000000" style={iS}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 100px 140px',gap:10}}>
              <div><label style={lS}>Adres</label><input value={rolnik.addr} onChange={e=>updR('addr',e.target.value)} placeholder="ul./miejscowość" style={iS}/></div>
              <div><label style={lS}>Kod</label><input value={rolnik.zip} onChange={e=>updR('zip',e.target.value)} placeholder="00-000" style={iS}/></div>
              <div><label style={lS}>Miasto</label><input value={rolnik.city} onChange={e=>updR('city',e.target.value)} style={iS}/></div>
            </div>
            <div style={{marginTop:8,padding:'6px 10px',background:'#c8e6c9',borderRadius:6,fontSize:10,color:'#1b5e20',fontWeight:600}}>
              ℹ️ Faktura VAT RR — wystawiana przez <b>nabywcę</b> (naszą firmę) dla rolnika ryczałtowego · VAT 7% (zryczałtowany zwrot podatku) · Obowiązkowe: PESEL lub NIP + nr dowodu
            </div>
          </Card>}

          {/* Nabywca details for regular VAT */}
          {fvType==='vat'&&selTarget&&<Card style={{padding:14,marginTop:8,border:'1px solid #ffab91',background:'#fff8f0'}}>
            <div style={{fontSize:11,fontWeight:800,color:'#e65100',marginBottom:8}}>📋 DANE NABYWCY</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 180px',gap:10,marginBottom:6}}>
              <div><label style={lS}>Nazwa / Imię i nazwisko</label><input value={nabywca.name} onChange={e=>updN('name',e.target.value)} style={iS}/></div>
              <div><label style={lS}>NIP</label><input value={nabywca.nip} onChange={e=>updN('nip',e.target.value)} placeholder="000-000-00-00" style={iS}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 100px 140px',gap:10}}>
              <div><label style={lS}>Adres</label><input value={nabywca.addr} onChange={e=>updN('addr',e.target.value)} style={iS}/></div>
              <div><label style={lS}>Kod</label><input value={nabywca.zip} onChange={e=>updN('zip',e.target.value)} placeholder="00-000" style={iS}/></div>
              <div><label style={lS}>Miasto</label><input value={nabywca.city} onChange={e=>updN('city',e.target.value)} style={iS}/></div>
            </div>
          </Card>}
        </>}
      </div>

      {/* ═══ STEP 3: Invoice details ═══ */}
      {allTargetItems&&<div style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:800,color:accentCol,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={stepBadge(3)}>3</span>
          DANE FAKTURY — {selTarget}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'200px 140px 140px 100px',gap:10,marginBottom:10}}>
          <div><label style={lS}>Numer FV</label><input value={fvNum} onChange={e=>setFvNum(e.target.value)}
            placeholder={fvType==='rr'?'RR/001/02/2026':fvType==='vat'?'FV/001/02/2026':'FS/001/02/2026'} style={iS}/></div>
          <div><label style={lS}>Data wystawienia</label><input type="date" value={fvDate} onChange={e=>setFvDate(e.target.value)} style={iS}/></div>
          <div><label style={lS}>{fvType==='rr'?'Data dostawy':'Data sprzedaży'}</label><input type="date" value={sellDate} onChange={e=>setSellDate(e.target.value)} style={iS}/></div>
          <div><label style={lS}>Termin (dni)</label><input type="number" min="0" value={payDays} onChange={e=>setPayDays(+e.target.value)} style={{...iS,textAlign:'center'}}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 160px',gap:10,marginBottom:12}}>
          <div><label style={lS}>Nazwa towaru na FV</label><input value={itemName} onChange={e=>setItemName(e.target.value)} style={iS}/></div>
          <div>
            <label style={lS}>Stawka VAT</label>
            {fvType==='rr'?
              <div style={{padding:'8px 12px',background:'#c8e6c9',borderRadius:6,fontSize:13,fontWeight:800,color:'#2e7d32',textAlign:'center'}}>7% (ryczałt)</div>
            :<div style={{display:'flex',gap:3}}>
              {['zw','0','5','8','23'].map(v=>
                <button key={v} onClick={()=>setVatRate(v)}
                  style={{flex:1,padding:'7px 2px',borderRadius:5,border:'none',fontSize:11,fontWeight:800,
                    background:vatRate===v?accentCol:'var(--bg)',color:vatRate===v?'#fff':'var(--mut)',cursor:'pointer'}}>
                  {v==='zw'?'ZW':v+'%'}
                </button>
              )}
            </div>}
          </div>
        </div>

        <PreviewTable/>

        {/* Summary & Export */}
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <button onClick={exportComarch} disabled={checkedCount===0}
            style={{padding:'12px 28px',background:checkedCount>0?accentGrad:'#ccc',border:'none',borderRadius:8,
              color:'#fff',fontSize:13,fontWeight:800,cursor:checkedCount>0?'pointer':'not-allowed',
              boxShadow:checkedCount>0?'0 2px 10px '+accentCol+'40':'none',
              display:'flex',alignItems:'center',gap:8,opacity:checkedCount>0?1:0.6}}>
            💾 Eksportuj {checkedCount} poz. → Comarch {currency==='EUR'?'(€ EUR)':''}
          </button>
          <div style={{fontSize:10,color:'var(--mut)'}}>
            {checkedCount===0?<span style={{color:'var(--r)',fontWeight:700}}>⚠️ Zaznacz transakcje do wystawienia FV</span>
            :fvType==='rr'?'Comarch ERP Optima · Import: Rejestry VAT zakupu → VAT RR'
             :fvType==='vat'?'Comarch ERP Optima · Import: Rejestry VAT sprzedaży'
             :'Comarch ERP Optima · Import: Rejestry VAT → Import dokumentów'}
          </div>
        </div>
      </div>}

    </div>
  </Card>;
}

/* ════════════════════════════════════════════════════════
   DODAJ TRANSAKCJĘ
   ════════════════════════════════════════════════════════ */
function AddTx({allSales,onAdd}){
  const [open,setOpen]=React.useState(false);
  const today=fmt(new Date());
  const blank={d:today,c:'',t:'W',q:'',s:'',tr:'',cr:'',cz:'',sr:'0',sz:'0',kg:'',pe:'Marek',cat:'TK',stk:''};
  const [f,setF]=React.useState({...blank});
  const [sugg,setSugg]=React.useState({field:null,items:[]});

  const clients=React.useMemo(()=>[...new Set(allSales.map(s=>s.c))].sort(),[allSales]);
  const ubojnie=React.useMemo(()=>[...new Set(allSales.map(s=>s.s))].sort(),[allSales]);
  const transporty=React.useMemo(()=>[...new Set(allSales.map(s=>s.tr))].filter(t=>t).sort(),[allSales]);

  /* ── Ostatnia transakcja per klient (auto-fill z bazy) ── */
  const lastByClient=React.useMemo(()=>{
    const m={};
    [...allSales].sort((a,b)=>a.d.localeCompare(b.d)).forEach(s=>{m[s.c]=s;});
    return m;
  },[allSales]);

  /* ── Ostatnia transakcja per ubojnia ── */
  const lastByUb=React.useMemo(()=>{
    const m={};
    [...allSales].sort((a,b)=>a.d.localeCompare(b.d)).forEach(s=>{m[s.s]=s;});
    return m;
  },[allSales]);

  const ubType=React.useMemo(()=>{
    const m={};
    allSales.forEach(s=>{if(!m[s.s])m[s.s]={wbc:0,zywa:0};if(s.t==='WBC')m[s.s].wbc+=s.q;else m[s.s].zywa+=s.q;});
    return m;
  },[allSales]);
  const isWBC=(n)=>{const u=ubType[n];return u?u.wbc>=u.zywa:UB_WBC.includes(n);};

  /* Auto-fill z bazy przy wyborze klienta */
  const fillFromClient=(clientName)=>{
    const last=lastByClient[clientName];
    if(!last)return;
    setF(p=>({...p,
      c:clientName,
      s:last.s||p.s,
      tr:last.isZ?'':last.tr||p.tr,
      t:last.t==='WBC'?'W':'Z',
      cat:last.cat||p.cat,
      cr:last.cr>0?String(last.cr):'',
      cz:last.cz>0?String(last.cz):'',
      pe:last.pe||p.pe,
      stk:last.stk>0?String(last.stk):p.stk
    }));
  };

  /* Auto-fill z bazy przy wyborze ubojni */
  const fillFromUb=(ubName)=>{
    const last=lastByUb[ubName];
    setF(p=>{
      const n={...p,s:ubName,t:isWBC(ubName)?'W':'Z'};
      if(last){
        if(!p.cr&&last.cr>0)n.cr=String(last.cr);
        if(!p.cz&&last.cz>0)n.cz=String(last.cz);
        if(!p.tr&&last.tr)n.tr=last.isZ?'':last.tr;
      }
      if(n.t==='W')n.stk='';
      return n;
    });
  };

  const set=(k,v)=>setF(p=>{
    const n={...p,[k]:v};
    if(k==='q'&&v&&!p.kg){n.kg=String(parseInt(v)*130);}
    if(k==='s'){
      if(isWBC(v))n.t='W'; else n.t='Z';
    }
    if(k==='t'&&v==='W'){n.stk='';}
    return n;
  });

  const lastPrice=React.useMemo(()=>{
    if(!f.s)return{cr:'',cz:''};
    const match=[...allSales].filter(s=>s.s===f.s).sort((a,b)=>b.d.localeCompare(a.d));
    if(match.length){return{cr:match[0].cr>0?String(match[0].cr):'',cz:match[0].cz>0?String(match[0].cz):''};}
    return{cr:'',cz:''};
  },[f.s,allSales]);

  const doAdd=()=>{
    if(!f.d||!f.c||!f.q||!f.s)return alert('Wypełnij: data, klient, ilość, ubojnia');
    const tr=normTr(f.tr||'ZAKŁAD');
    const rec={
      id:allSales.length+1+Math.random(),
      d:f.d, c:f.c.toUpperCase(), t:f.t==='W'?'WBC':'Żywa',
      q:parseInt(f.q)||0, s:f.s.toUpperCase(), tr, isZ:tr==='ZAKŁAD',
      cr:parseFloat(f.cr)||0, cz:parseFloat(f.cz)||0,
      sr:parseFloat(f.sr)||0, sz:parseFloat(f.sz)||0,
      kg:parseInt(f.kg)||(parseInt(f.q)||0)*130,
      pe:f.pe||'Marek',
      cat:f.cat||'TK',
      stk:f.t==='Z'?parseFloat(f.stk)||0:0
    };
    onAdd(rec);
    setF({...blank,d:f.d,pe:f.pe,cat:f.cat});
    setOpen(false);
  };

  const showSugg=(field,items,val)=>{
    if(!val){setSugg({field:null,items:[]});return;}
    const q=val.toUpperCase();
    setSugg({field,items:items.filter(i=>i.toUpperCase().includes(q)).slice(0,8)});
  };

  const iS={width:'100%',padding:'8px 10px',border:'2px solid var(--brd)',borderRadius:6,fontSize:13,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",background:'#fff',outline:'none'};
  const lS={fontSize:9,fontWeight:800,color:'var(--mut)',display:'block',marginBottom:3,letterSpacing:1,textTransform:'uppercase'};

  if(!open) return<div style={{marginBottom:10}}>
    <button onClick={()=>setOpen(true)} style={{padding:'12px 20px',background:'linear-gradient(135deg,#e65100,#bf360c)',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',gap:6,boxShadow:'0 3px 14px rgba(230,81,0,.45)',width:'100%',justifyContent:'center',letterSpacing:0.5}}>
      ＋ Wprowadź sprzedaż
    </button>
  </div>;

  return<Card style={{marginBottom:14,border:'2px solid var(--g)',overflow:'visible'}}>
    <div style={{background:'var(--g)',padding:'8px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{color:'#fff',fontWeight:800,fontSize:13}}>＋ WPROWADŹ SPRZEDAŻ</span>
      <button onClick={()=>setOpen(false)} style={{background:'#fff3',border:'none',borderRadius:4,color:'#fff',padding:'3px 10px',fontSize:12,fontWeight:800,cursor:'pointer'}}>✕</button>
    </div>
    <div style={{padding:'16px 20px',background:'#f8fdf8'}}>
      {/* Row 1: Data, Klient, Typ, TK/WR, Szt */}
      <div style={{display:'grid',gridTemplateColumns:'130px 1fr 100px 100px 90px',gap:10,marginBottom:10}}>
        <div>
          <label style={lS}>📅 Data</label>
          <input type="date" value={f.d} onChange={e=>set('d',e.target.value)} style={iS}/>
        </div>
        <div style={{position:'relative'}}>
          <label style={lS}>👤 Klient</label>
          <input value={f.c} onChange={e=>{set('c',e.target.value);showSugg('c',clients,e.target.value);}}
            onBlur={()=>setTimeout(()=>setSugg({field:null,items:[]}),150)}
            placeholder="Nazwa klienta" style={iS}/>
          {sugg.field==='c'&&sugg.items.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1px solid var(--brd)',borderRadius:6,boxShadow:'0 4px 12px rgba(0,0,0,.12)',maxHeight:160,overflowY:'auto'}}>
            {sugg.items.map(s=><div key={s} onMouseDown={()=>{fillFromClient(s);setSugg({field:null,items:[]});}} style={{padding:'6px 10px',fontSize:11,cursor:'pointer',borderBottom:'1px solid #f0f0f0',fontWeight:600}}>
              {s}
              {lastByClient[s]?<span style={{fontSize:9,color:'var(--mut)',marginLeft:6}}>→ {lastByClient[s].s} · {lastByClient[s].cr>0?lastByClient[s].cr+' zł':''}</span>:''}
            </div>)}
          </div>}
          {f.c&&lastByClient[f.c.toUpperCase()]&&<div style={{fontSize:8,color:'var(--g)',marginTop:2,fontWeight:700}}>✓ Dane załadowane z bazy: {lastByClient[f.c.toUpperCase()].s} · {lastByClient[f.c.toUpperCase()].d}</div>}
        </div>
        <div>
          <label style={lS}>📋 Typ</label>
          <div style={{display:'flex',gap:3}}>
            {[['W','WBC'],['Z','Żywa']].map(([k,l])=>
              <button key={k} onClick={()=>set('t',k)} style={{flex:1,padding:'8px 4px',borderRadius:6,border:'none',fontSize:11,fontWeight:800,cursor:'pointer',
                background:f.t===k?(k==='W'?'var(--b)':'var(--g)'):'var(--bg)',color:f.t===k?'#fff':'var(--mut)'}}>{l}</button>
            )}
          </div>
        </div>
        <div>
          <label style={lS}>🐷 Kategoria</label>
          <div style={{display:'flex',gap:3}}>
            {[['TK','TK'],['WR','WR']].map(([k,l])=>
              <button key={k} onClick={()=>set('cat',k)} style={{flex:1,padding:'8px 4px',borderRadius:6,border:'none',fontSize:11,fontWeight:800,cursor:'pointer',
                background:f.cat===k?(k==='TK'?'#5d4037':'#e65100'):'var(--bg)',color:f.cat===k?'#fff':'var(--mut)'}}>{l}</button>
            )}
          </div>
        </div>
        <div>
          <label style={lS}>📦 Szt.</label>
          <input type="number" min="1" value={f.q} onChange={e=>set('q',e.target.value)} placeholder="170" style={{...iS,textAlign:'center',fontWeight:900,fontSize:16}}/>
        </div>
      </div>

      {/* Row 1b: Straczka (only when Żywa) */}
      {f.t==='Z'&&<div style={{display:'grid',gridTemplateColumns:'140px 1fr',gap:10,marginBottom:10,padding:'8px 12px',background:'#e8f5e9',borderRadius:8,border:'1px solid #a5d6a7'}}>
        <div>
          <label style={{...lS,color:'var(--r)'}}>📉 Straczka %</label>
          <input type="number" min="0" max="10" step="0.1" value={f.stk} onChange={e=>set('stk',e.target.value)} placeholder="np. 2.5"
            style={{...iS,textAlign:'center',borderColor:'#ef9a9a',color:'var(--r)',fontWeight:900,fontSize:16}}/>
        </div>
        <div style={{display:'flex',alignItems:'center',fontSize:11,color:'var(--g)',fontWeight:600}}>
          🟢 Sprzedaż na żywą — {f.stk?'straczka: '+f.stk+'%':'wpisz % straczki'}
        </div>
      </div>}

      {/* Row 2: Ubojnia, Transport, Osoba */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 160px',gap:10,marginBottom:10}}>
        <div style={{position:'relative'}}>
          <label style={lS}>🏭 Ubojnia</label>
          <input value={f.s} onChange={e=>{set('s',e.target.value.toUpperCase());showSugg('s',ubojnie,e.target.value);}}
            onBlur={()=>setTimeout(()=>setSugg({field:null,items:[]}),150)}
            placeholder="np. RYTEL" style={{...iS,textTransform:'uppercase'}}/>
          {sugg.field==='s'&&sugg.items.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1px solid var(--brd)',borderRadius:6,boxShadow:'0 4px 12px rgba(0,0,0,.12)',maxHeight:160,overflowY:'auto'}}>
            {sugg.items.map(s=><div key={s} onMouseDown={()=>{fillFromUb(s);setSugg({field:null,items:[]});}} style={{padding:'6px 10px',fontSize:11,cursor:'pointer',borderBottom:'1px solid #f0f0f0',fontWeight:600}}>
              {isWBC(s)?'🔵 ':'🟢 '}{s}
              {lastByUb[s]?<span style={{fontSize:9,color:'var(--mut)',marginLeft:6}}>· {lastByUb[s].cz>0?lastByUb[s].cz+' zł/kg':''}</span>:''}
            </div>)}
          </div>}
          {lastPrice.cz&&<div style={{fontSize:8,color:'var(--mut)',marginTop:2}}>Ostatnia cena zakł.: {lastPrice.cz} zł</div>}
        </div>
        <div style={{position:'relative'}}>
          <label style={lS}>🚛 Transport</label>
          <input value={f.tr} onChange={e=>{set('tr',e.target.value.toUpperCase());showSugg('tr',transporty,e.target.value);}}
            onBlur={()=>setTimeout(()=>setSugg({field:null,items:[]}),150)}
            placeholder="np. MARZEC / ZAKŁAD" style={{...iS,textTransform:'uppercase'}}/>
          {sugg.field==='tr'&&sugg.items.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1px solid var(--brd)',borderRadius:6,boxShadow:'0 4px 12px rgba(0,0,0,.12)',maxHeight:160,overflowY:'auto'}}>
            {sugg.items.map(s=><div key={s} onMouseDown={()=>{set('tr',s);setSugg({field:null,items:[]});}} style={{padding:'6px 10px',fontSize:11,cursor:'pointer',borderBottom:'1px solid #f0f0f0',fontWeight:600}}>{s}</div>)}
          </div>}
        </div>
        <div>
          <label style={lS}>👤 Osoba</label>
          <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
            {['Marek','Klaudia','Robert'].map(p=>
              <button key={p} onClick={()=>set('pe',p)} style={{flex:1,padding:'8px 4px',borderRadius:6,border:'none',fontSize:10,fontWeight:800,cursor:'pointer',
                background:f.pe===p?(PE_COL[p]||'var(--g)'):'var(--bg)',color:f.pe===p?'#fff':(PE_COL[p]||'var(--mut)')}}>{p}</button>
            )}
          </div>
        </div>
      </div>

      {/* Row 3: Ceny */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
        <div>
          <label style={{...lS,color:'#b8860b'}}>🧑‍🌾 Cena rolnik netto</label>
          <input type="number" step="0.01" min="0" value={f.cr} onChange={e=>set('cr',e.target.value)} placeholder={lastPrice.cr||'0.00'}
            style={{...iS,borderColor:'#ffe082',textAlign:'center',color:'#b8860b'}}/>
          <div style={{fontSize:8,color:'var(--mut)',textAlign:'center'}}>zł/kg</div>
        </div>
        <div>
          <label style={{...lS,color:'var(--b)'}}>🏭 Cena zakład netto</label>
          <input type="number" step="0.01" min="0" value={f.cz} onChange={e=>set('cz',e.target.value)} placeholder={lastPrice.cz||'0.00'}
            style={{...iS,borderColor:'#90caf9',textAlign:'center',color:'var(--b)'}}/>
          <div style={{fontSize:8,color:'var(--mut)',textAlign:'center'}}>zł/kg</div>
        </div>
        <div>
          <label style={{...lS,color:'var(--gd)'}}>⚖️ Waga (kg)</label>
          <input type="number" min="0" value={f.kg} onChange={e=>set('kg',e.target.value)} placeholder={f.q?String(parseInt(f.q)*130):'—'}
            style={{...iS,textAlign:'center'}}/>
          <div style={{fontSize:8,color:'var(--mut)',textAlign:'center'}}>{f.q?'auto: '+parseInt(f.q)*130+' kg':''}</div>
        </div>
      </div>

      {/* Summary & Buttons */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderTop:'1px solid var(--brd)'}}>
        <div style={{fontSize:11,color:'var(--mut)'}}>
          {f.c&&f.q&&f.s?<span style={{color:'var(--gd)',fontWeight:700}}>
            {f.d} · <b>{f.c.toUpperCase()}</b> · {f.t==='W'?'WBC':'Żywa'} · {f.cat} · <b>{f.q} szt.</b> → {f.s.toUpperCase()} · {f.tr||'ZAKŁAD'}
            {f.cr&&f.cz?' · zysk: '+((parseFloat(f.cz)||0)-(parseFloat(f.cr)||0)).toFixed(2)+' zł/kg':''}
          </span>:'Wypełnij dane transakcji…'}
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>{setF({...blank});setOpen(false);}} style={{padding:'8px 16px',background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,fontSize:11,fontWeight:700,color:'var(--mut)',cursor:'pointer'}}>Anuluj</button>
          <button onClick={doAdd} style={{padding:'8px 24px',background:'var(--g)',border:'none',borderRadius:6,fontSize:12,fontWeight:800,color:'#fff',cursor:'pointer',boxShadow:'0 2px 8px rgba(46,125,50,.3)'}}>
            ✓ Dodaj sprzedaż
          </button>
        </div>
      </div>
    </div>
  </Card>;
}

/* ════════════════════════════════════════════════════════
   ZGŁOSZONE DO SPRZEDAŻY WR/TK
   ════════════════════════════════════════════════════════ */
function ReportedSales({allSales,reported,setReported,clientDb={}}){
  const today=new Date();
  const curWk=getMon(today);
  const [offset,setOffset]=React.useState(0);
  const [edit,setEdit]=React.useState(null); // {cl,wk}
  const WEEKS_SHOW=8;
  const REP_PE_COL={Mateusz:'#1565c0',Przemek:'#e65100'};
  const [search,setSearch]=React.useState('');

  /* ── weeks array (same as Planner) ── */
  const weeks=React.useMemo(()=>{
    const ws=[];
    const startWk=addD(curWk,(offset-3)*7);
    for(let i=0;i<WEEKS_SHOW;i++){
      const mon=addD(startWk,i*7);
      const s=fmt(mon),e=fmt(addD(mon,6));
      const isPast=addD(mon,6)<today;
      const isCur=fmt(mon)===fmt(curWk);
      const isFut=mon>today;
      ws.push({mon,s,e,key:s,isPast,isCur,isFut,wn:getWeekNum(mon),
        mLabel:MS_S[mon.getMonth()]+' '+mon.getFullYear(),
        dLabel:mon.getDate()+'.'+String(mon.getMonth()+1).padStart(2,'0')+'–'+addD(mon,6).getDate()+'.'+String(addD(mon,6).getMonth()+1).padStart(2,'0')});
    }
    return ws;
  },[offset]);

  /* ── clients from DB (categorized by clientDb first, then auto) ── */
  const dbClients=React.useMemo(()=>{
    const byQ={};const byTyp={};
    allSales.forEach(s=>{
      const cl=s.c.toUpperCase().trim();
      byQ[cl]=(byQ[cl]||0)+s.q;
      if(!byTyp[cl])byTyp[cl]={wbc:0,zywa:0};
      if(s.t==='WBC')byTyp[cl].wbc+=s.q; else byTyp[cl].zywa+=s.q;
    });
    // also include clients that appear only in reported
    weeks.forEach(w=>{if(reported[w.key])Object.keys(reported[w.key]).forEach(cl=>{if(!byQ[cl])byQ[cl]=0;if(!byTyp[cl])byTyp[cl]={wbc:0,zywa:0};});});
    // include clients from clientDb
    Object.keys(clientDb).forEach(cl=>{if(!byQ[cl])byQ[cl]=0;if(!byTyp[cl])byTyp[cl]={wbc:0,zywa:0};});
    const all=Object.keys(byQ);
    const wr=all.filter(c=>{
      if(clientDb[c])return clientDb[c]==='WR';
      const u=byTyp[c];return u.wbc>=u.zywa;
    }).sort((a,b)=>(byQ[b]||0)-(byQ[a]||0));
    const tk=all.filter(c=>{
      if(clientDb[c])return clientDb[c]==='TK';
      const u=byTyp[c];return u.zywa>u.wbc;
    }).sort((a,b)=>(byQ[b]||0)-(byQ[a]||0));
    return{wr,tk};
  },[allSales,weeks,reported,clientDb]);

  /* ── filtered clients by search ── */
  const filtClients=React.useMemo(()=>{
    const q=search.toUpperCase().trim();
    if(!q)return dbClients;
    return{wr:dbClients.wr.filter(c=>c.includes(q)),tk:dbClients.tk.filter(c=>c.includes(q))};
  },[dbClients,search]);

  /* ── realData from DB (historical) ── */
  const realData=React.useMemo(()=>{
    const m={};
    allSales.forEach(s=>{
      const wMon=getMon(new Date(s.d));
      const wk=fmt(wMon);
      const cl=s.c.toUpperCase().trim();
      const k=cl+'|'+wk;
      if(!m[k])m[k]={szt:0,aut:0};
      m[k].szt+=s.q;
    });
    Object.values(m).forEach(v=>{v.aut=Math.max(1,Math.round(v.szt/SZT_PER_AUT));});
    return m;
  },[allSales]);

  /* ── plan getters/setters (identical pattern to Planner) ── */
  const getPlan=(cl,wk)=>(reported[wk]&&reported[wk][cl])||{aut:'',szt:'',pe:'',typ:''};
  const setPlanField=(cl,wk,field,val)=>{
    setReported(prev=>{
      const w={...(prev[wk]||{})};
      const cell={...(w[cl]||{aut:'',szt:'',pe:'',typ:''})};
      cell[field]=val;
      if(field==='aut'&&val){cell.szt=String(Math.round(parseInt(val)*SZT_PER_AUT));}
      else if(field==='szt'&&val){cell.aut=String(Math.max(1,Math.ceil(parseInt(val)/SZT_PER_AUT)));}
      if(!cell.aut&&!cell.szt&&!cell.pe&&!cell.typ)delete w[cl]; else w[cl]=cell;
      return{...prev,[wk]:w};
    });
  };

  /* ── week totals ── */
  const weekTotals=weeks.map(w=>{
    let szt=0,aut=0;
    [...dbClients.wr,...dbClients.tk].forEach(cl=>{
      const rd=realData[cl+'|'+w.key];
      const pl=getPlan(cl,w.key);
      if(w.isPast&&rd){szt+=rd.szt;aut+=rd.aut;}
      else if(!w.isPast){szt+=parseInt(pl.szt)||0;aut+=parseInt(pl.aut)||0;}
    });
    return{szt,aut};
  });
  const maxWkSzt=Math.max(...weekTotals.map(t=>t.szt),1);

  const isEd=(cl,wk)=>edit&&edit.cl===cl&&edit.wk===wk;

  /* ── Cell ── */
  const Cell=({cl,w})=>{
    const rd=realData[cl+'|'+w.key];
    const pl=getPlan(cl,w.key);
    const sel=isEd(cl,w.key);

    if(w.isPast){
      if(!rd) return<td style={{padding:2,textAlign:'center',background:'#fafaf8',borderRight:'1px solid #f0ede5'}}>
        <span className="m" style={{fontSize:10,color:'#ddd'}}>—</span>
      </td>;
      return<td style={{padding:2,borderRight:'1px solid #f0ede5'}}>
        <div style={{background:'#f0f7f0',borderRadius:6,padding:'4px 2px',textAlign:'center',border:'1px solid #c8e6c9'}}>
          <div className="m" style={{fontSize:14,fontWeight:900,color:'var(--gd)'}}>{rd.szt}</div>
          <div style={{fontSize:8,color:'var(--g)',fontWeight:700}}>🚛{rd.aut}</div>
        </div>
      </td>;
    }

    const hasPlan=pl.aut||pl.szt||pl.pe||pl.typ;
    const hasReal=rd&&rd.szt>0;
    return<td style={{padding:2,background:w.isCur?'var(--g)08':'#fffdf5',borderRight:'1px solid '+(w.isCur?'var(--g)20':'#f5f0e0'),
      borderLeft:w.isCur?'2px solid var(--g)':''}}>
      {hasReal&&<div style={{background:'#e8f5e9',borderRadius:5,padding:'2px',textAlign:'center',marginBottom:2,border:'1px solid #a5d6a7'}}>
        <span className="m" style={{fontSize:12,fontWeight:900,color:'var(--gd)'}}>✓{rd.szt}</span>
        <span style={{fontSize:7,color:'var(--g)',marginLeft:3}}>🚛{rd.aut}</span>
      </div>}
      <div onClick={()=>setEdit(sel?null:{cl,wk:w.key})}
        style={{background:sel?'#fff3e0':hasPlan?'#fffde7':'#fff',
          border:sel?'2px solid var(--a)':'1px '+(hasPlan?'solid #ffe082':'dashed #e0dcc8'),
          borderRadius:6,padding:'4px 2px',textAlign:'center',cursor:'pointer',
          minHeight:hasReal?28:42,transition:'all .15s',
          boxShadow:sel?'0 0 8px var(--a)40':'none'}}>
        {hasPlan?<>
          <div style={{display:'flex',justifyContent:'center',gap:6,alignItems:'baseline'}}>
            <span className="m" style={{fontSize:14,fontWeight:900,color:'var(--g)'}}>{pl.szt||'—'}</span>
            <span className="m" style={{fontSize:10,fontWeight:700,color:'#b8860b'}}>🚛{pl.aut||'—'}</span>
          </div>
          {pl.typ&&<div style={{fontSize:7,fontWeight:800,color:pl.typ==='WR'?'#e65100':'#5d4037',marginTop:1}}>{pl.typ==='WR'?'🐽 WR':'🐷 TK'}</div>}
          {pl.pe&&<div style={{fontSize:7,fontWeight:700,color:REP_PE_COL[pl.pe]||'var(--mut)',marginTop:1}}>👤 {pl.pe}</div>}
        </>:<div style={{fontSize:10,color:'#ccc',padding:'4px 0'}}>+ zgłoś</div>}
      </div>
    </td>;
  };

  /* ── Client Row ── */
  const ClRow=({cl,idx})=>{
    let totSzt=0,totAut=0;
    weeks.forEach(w=>{
      const rd=realData[cl+'|'+w.key];
      const pl=getPlan(cl,w.key);
      if(w.isPast&&rd){totSzt+=rd.szt;totAut+=rd.aut;}
      else if(!w.isPast){totSzt+=parseInt(pl.szt)||0;totAut+=parseInt(pl.aut)||0;}
    });
    const isActive=edit&&edit.cl===cl;
    const bg=isActive?'#fff8e1':idx%2?'#fafafa':'#fff';
    return<tr style={{background:bg,borderBottom:'1px solid '+(isActive?'#ffe082':'#f3f0e8'),boxShadow:isActive?'inset 0 0 0 2px #ffb300':'none'}}>
      <td style={{padding:'6px 10px',position:'sticky',left:0,background:bg,zIndex:1,borderRight:'2px solid '+(isActive?'#ffb300':'var(--brd)'),fontSize:11,fontWeight:isActive?900:700,whiteSpace:'nowrap',color:isActive?'#e65100':'inherit',borderLeft:isActive?'3px solid #ffb300':'none'}}>{isActive?'▶ ':''}{cl}</td>
      {weeks.map(w=><Cell key={w.key} cl={cl} w={w}/>)}
      <td style={{textAlign:'center',padding:'4px 6px',background:isActive?'#fff3e0':'#fafaf6',borderLeft:'2px solid var(--brd)'}}>
        <div className="m" style={{fontSize:14,fontWeight:900,color:totSzt?'var(--g)':'#ddd'}}>{totSzt||'—'}</div>
        {totAut>0&&<div style={{fontSize:8,color:'var(--mut)',fontWeight:600}}>🚛{totAut}</div>}
      </td>
    </tr>;
  };

  const editPlan=edit?getPlan(edit.cl,edit.wk):null;
  const editWeek=edit?weeks.find(w=>w.key===edit.wk):null;
  const editRef=React.useRef(null);
  React.useEffect(()=>{if(edit&&editRef.current)editRef.current.scrollIntoView({behavior:'smooth',block:'nearest'});},[edit]);

  /* ── RENDER ── */
  return<div>
    {/* Nav */}
    <Card style={{padding:'10px 16px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <button onClick={()=>setOffset(o=>o-4)} style={{background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,padding:'6px 10px',fontWeight:800,fontSize:12,color:'var(--gd)',cursor:'pointer'}}>⏪</button>
        <button onClick={()=>setOffset(o=>o-1)} style={{background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,padding:'6px 12px',fontWeight:800,fontSize:14,color:'var(--gd)',cursor:'pointer'}}>◀</button>
      </div>
      <div style={{textAlign:'center',flex:1}}>
        <div style={{fontSize:16,fontWeight:900,color:'var(--gd)'}}>📝 ZGŁOSZENIA WR/TK — OŚ CZASU</div>
        <div style={{fontSize:11,color:'var(--mut)',fontWeight:600,marginTop:2}}>
          <span style={{color:'#c8e6c9'}}>■</span> Zrealizowane → <span style={{color:'var(--g)',fontWeight:800}}>● TERAZ</span> → <span style={{color:'#ffe082'}}>■</span> Zgłoszone
        </div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {offset!==0&&<button onClick={()=>setOffset(0)} style={{background:'var(--g)',border:'none',borderRadius:6,padding:'6px 14px',fontWeight:800,fontSize:11,color:'#fff',cursor:'pointer'}}>⏺ Dziś</button>}
        <button onClick={()=>setOffset(o=>o+1)} style={{background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,padding:'6px 12px',fontWeight:800,fontSize:14,color:'var(--gd)',cursor:'pointer'}}>▶</button>
        <button onClick={()=>setOffset(o=>o+4)} style={{background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,padding:'6px 10px',fontWeight:800,fontSize:12,color:'var(--gd)',cursor:'pointer'}}>⏩</button>
      </div>
    </Card>

    {/* Volume chart */}
    <Card style={{padding:'10px 16px',marginBottom:10}}>
      <div style={{fontSize:9,fontWeight:700,color:'var(--mut)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Wolumen tygodniowy — szt.</div>
      <div style={{display:'flex',alignItems:'flex-end',gap:4,height:55}}>
        {weeks.map((w,i)=>{
          const t=weekTotals[i];
          const h=Math.max(3,t.szt/maxWkSzt*45);
          const bg=w.isCur?'var(--g)':w.isPast?'#81c784':'#ffe082';
          return<div key={w.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            {t.szt>0&&<span className="m" style={{fontSize:9,color:w.isPast?'var(--gd)':'#b8860b',fontWeight:800}}>{t.szt}</span>}
            <div style={{width:'100%',height:h,background:bg,borderRadius:4,transition:'height .3s',border:w.isCur?'2px solid var(--gd)':'none'}}/>
            <span style={{fontSize:8,color:w.isCur?'var(--g)':'var(--mut)',fontWeight:w.isCur?900:600}}>T{w.wn}</span>
          </div>;
        })}
      </div>
    </Card>

    {/* ══ EDIT CARD (sticky above table) ══ */}
    <div ref={editRef}/>
    {edit&&editWeek&&editPlan&&<div style={{position:'sticky',top:0,zIndex:50,marginBottom:8}}>
      <Card style={{padding:0,border:'2px solid var(--a)',overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.12)'}}>
      <div style={{background:'var(--a)',padding:'8px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{color:'#fff',fontWeight:800,fontSize:13}}>
          ✏️ {edit.cl} — T{editWeek.wn} ({editWeek.dLabel})
        </div>
        <button onClick={()=>setEdit(null)} style={{background:'#fff3',border:'none',borderRadius:4,color:'#fff',padding:'3px 10px',fontSize:12,fontWeight:800,cursor:'pointer'}}>✕ Zamknij</button>
      </div>
      <div style={{padding:'12px 16px',background:'#fffbf0',display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:120}}>
          <label style={{fontSize:10,fontWeight:800,color:'#b8860b',display:'block',marginBottom:4,letterSpacing:1}}>🚛 ILOŚĆ AUT</label>
          <input type="number" min="0" placeholder="np. 2"
            value={editPlan.aut}
            onChange={e=>setPlanField(edit.cl,edit.wk,'aut',e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'2px solid #ffe082',borderRadius:8,fontSize:22,fontWeight:900,color:'#b8860b',
              fontFamily:"'JetBrains Mono',monospace",background:'#fff',outline:'none',textAlign:'center'}}/>
          <div style={{fontSize:9,color:'var(--mut)',marginTop:4,textAlign:'center'}}>
            {editPlan.aut?'= ~'+Math.round(parseInt(editPlan.aut)*SZT_PER_AUT)+' szt. (×'+SZT_PER_AUT+')':'Wpisz aut → auto szt.'}
          </div>
        </div>
        <div style={{flex:1,minWidth:120}}>
          <label style={{fontSize:10,fontWeight:800,color:'var(--g)',display:'block',marginBottom:4,letterSpacing:1}}>📦 ILOŚĆ SZTUK</label>
          <input type="number" min="0" placeholder="np. 340"
            value={editPlan.szt}
            onChange={e=>setPlanField(edit.cl,edit.wk,'szt',e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'2px solid #a5d6a7',borderRadius:8,fontSize:22,fontWeight:900,color:'var(--g)',
              fontFamily:"'JetBrains Mono',monospace",background:'#fff',outline:'none',textAlign:'center'}}/>
          <div style={{fontSize:9,color:'var(--mut)',marginTop:4,textAlign:'center'}}>
            {editPlan.szt?'= ~'+Math.max(1,Math.ceil(parseInt(editPlan.szt)/SZT_PER_AUT))+' aut (÷'+SZT_PER_AUT+')':'Wpisz szt. → auto aut'}
          </div>
        </div>
        <div style={{flex:1,minWidth:140}}>
          <label style={{fontSize:10,fontWeight:800,color:'var(--mut)',display:'block',marginBottom:4,letterSpacing:1}}>👤 KTO WPROWADZIŁ</label>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {['Mateusz','Przemek'].map(p=>{
              const sel=editPlan.pe===p;
              return<button key={p} onClick={()=>setPlanField(edit.cl,edit.wk,'pe',sel?'':p)}
                style={{flex:1,padding:'10px 6px',borderRadius:8,border:sel?'2px solid '+(REP_PE_COL[p]||'var(--g)'):'2px solid var(--brd)',
                  background:sel?(REP_PE_COL[p]||'var(--g)'):'#fff',
                  color:sel?'#fff':(REP_PE_COL[p]||'var(--gd)'),
                  fontSize:12,fontWeight:800,cursor:'pointer',transition:'all .15s',minWidth:70}}>
                {sel?'✓ ':''}{p}
              </button>;
            })}
          </div>
          <div style={{fontSize:9,color:'var(--mut)',marginTop:4,textAlign:'center'}}>
            {editPlan.pe?'Wprowadził: '+editPlan.pe:'Wybierz osobę'}
          </div>
        </div>
        <div style={{flex:1,minWidth:120}}>
          <label style={{fontSize:10,fontWeight:800,color:'#7b1fa2',display:'block',marginBottom:4,letterSpacing:1}}>🐷 WR / TK</label>
          <div style={{display:'flex',gap:4}}>
            {[['WR','🐽 WR'],['TK','🐷 TK']].map(([k,l])=>
              <button key={k} onClick={()=>setPlanField(edit.cl,edit.wk,'typ',editPlan.typ===k?'':k)}
                style={{flex:1,padding:'10px 6px',borderRadius:8,border:editPlan.typ===k?'2px solid '+(k==='WR'?'#e65100':'#5d4037'):'2px solid var(--brd)',
                  background:editPlan.typ===k?(k==='WR'?'#e65100':'#5d4037'):'#fff',
                  color:editPlan.typ===k?'#fff':(k==='WR'?'#e65100':'#5d4037'),
                  fontSize:12,fontWeight:800,cursor:'pointer',transition:'all .15s'}}>
                {l}
              </button>
            )}
          </div>
          <div style={{fontSize:9,color:'var(--mut)',marginTop:4,textAlign:'center'}}>
            {editPlan.typ?editPlan.typ==='WR'?'Wolny Rynek':'Tucznik':'Wybierz typ'}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',paddingBottom:4}}>
          <button onClick={()=>{
            setReported(prev=>{const w={...(prev[edit.wk]||{})};delete w[edit.cl];return{...prev,[edit.wk]:w};});
            setEdit(null);
          }} style={{padding:'8px 14px',background:'var(--bg)',border:'1px solid var(--brd)',borderRadius:6,fontSize:10,fontWeight:700,color:'var(--r)',cursor:'pointer'}}>
            🗑️ Wyczyść
          </button>
        </div>
      </div>
      </Card>
    </div>}

    {/* ══ Search + Table ══ */}
    <Card style={{padding:0,overflow:'hidden'}}>
      <div style={{padding:'10px 14px',background:'#fafaf8',borderBottom:'1px solid var(--brd)',display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:'1 1 220px',maxWidth:350}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,pointerEvents:'none'}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj klienta..."
            style={{width:'100%',padding:'8px 12px 8px 34px',borderRadius:8,border:'2px solid '+(search?'var(--g)':'var(--brd)'),fontSize:13,fontWeight:600,
              fontFamily:'inherit',background:'#fff',outline:'none',transition:'border .2s'}}/>
          {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
            background:'var(--bg)',border:'none',borderRadius:'50%',width:20,height:20,fontSize:11,color:'var(--mut)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>}
        </div>

function ClientDatabase({allSales,clientDb,setClientDb}){
  const [search,setSearch]=React.useState('');
  const [newName,setNewName]=React.useState('');
  const [showAdd,setShowAdd]=React.useState(false);

  /* All unique clients from sales + clientDb */
  const allClients=React.useMemo(()=>{
    const m={};
    allSales.forEach(s=>{
      const cl=s.c.toUpperCase().trim();
      if(!m[cl])m[cl]={szt:0,cnt:0,wbc:0,zywa:0,lastD:''};
      m[cl].szt+=s.q;m[cl].cnt++;
      if(s.t==='WBC')m[cl].wbc+=s.q; else m[cl].zywa+=s.q;
      if(s.d>m[cl].lastD)m[cl].lastD=s.d;
    });
    // include clients added manually but not in sales
    Object.keys(clientDb).forEach(cl=>{if(!m[cl])m[cl]={szt:0,cnt:0,wbc:0,zywa:0,lastD:''};});
    return m;
  },[allSales,clientDb]);

  /* auto-detect category for clients not in clientDb */
  const getAutoCat=(cl)=>{
    const d=allClients[cl];
    if(!d)return'TK';
    return d.wbc>=d.zywa?'WR':'TK';
  };

  /* sorted client list */
  const clientList=React.useMemo(()=>{
    let list=Object.keys(allClients).map(cl=>({
      name:cl,
      cat:clientDb[cl]||null,
      autoCat:getAutoCat(cl),
      ...allClients[cl]
    }));
    list.sort((a,b)=>(b.szt-a.szt));
    if(search){
      const q=search.toUpperCase().trim();
      list=list.filter(c=>c.name.includes(q));
    }
    return list;
  },[allClients,clientDb,search]);

  const wrCount=clientList.filter(c=>(c.cat||c.autoCat)==='WR').length;
  const tkCount=clientList.filter(c=>(c.cat||c.autoCat)==='TK').length;

  const setCat=(cl,cat)=>setClientDb(prev=>({...prev,[cl]:cat}));
  const removeCl=(cl)=>setClientDb(prev=>{const n={...prev};delete n[cl];return n;});

  const addNewClient=()=>{
    const name=newName.toUpperCase().trim();
    if(!name)return;
    if(allClients[name]||clientDb[name]){alert('Klient już istnieje!');return;}
    setClientDb(prev=>({...prev,[name]:'TK'}));
    setNewName('');
  };

  return<div>

        </div>
        <div style={{display:'flex',gap:10,fontSize:11,fontWeight:800}}>
          <span style={{color:'#e65100'}}>🐽 WR: {wrCount}</span>
          <span style={{color:'#5d4037'}}>🐷 TK: {tkCount}</span>
          <span style={{color:'var(--mut)'}}>Razem: {clientList.length}</span>
        </div>
      </div>

      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
        <div style={{position:'relative',flex:'1 1 250px',maxWidth:400}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,pointerEvents:'none'}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj klienta..."
            style={{width:'100%',padding:'10px 12px 10px 34px',borderRadius:8,border:'2px solid '+(search?'var(--g)':'var(--brd)'),fontSize:13,fontWeight:600,fontFamily:'inherit',background:'#fff',outline:'none'}}/>
          {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'var(--bg)',border:'none',borderRadius:'50%',width:22,height:22,fontSize:11,color:'var(--mut)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>}
        </div>
        <button onClick={()=>setShowAdd(!showAdd)} style={{padding:'10px 16px',borderRadius:8,border:'none',background:showAdd?'var(--g)':'var(--gd)',color:'#fff',fontSize:12,fontWeight:800,cursor:'pointer'}}>
          {showAdd?'✕ Zamknij':'＋ Nowy klient'}
        </button>
      </div>

      {showAdd&&<div style={{background:'#f0f7f0',borderRadius:10,padding:14,marginBottom:12,border:'2px solid #c8e6c9',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addNewClient();}}
          placeholder="Nazwa nowego klienta..."
          style={{flex:'1 1 200px',padding:'10px 14px',borderRadius:8,border:'2px solid var(--brd)',fontSize:13,fontWeight:700,fontFamily:'inherit',outline:'none',textTransform:'uppercase'}}/>
        <button onClick={addNewClient} style={{padding:'10px 18px',borderRadius:8,border:'none',background:'var(--g)',color:'#fff',fontSize:12,fontWeight:800,cursor:'pointer'}}>
          ＋ Dodaj klienta
        </button>
      </div>}
    </Card>

    <Card style={{padding:0,overflow:'hidden'}}>
      <table style={{borderCollapse:'collapse',width:'100%'}}>
        <thead>
          <tr style={{background:'var(--gd)'}}>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'#fff',fontWeight:800,minWidth:180}}>KLIENT</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'#fff',fontWeight:800,width:160}}>KATEGORIA</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'var(--gld)',fontWeight:800,width:80}}>SZT.</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'var(--gld)',fontWeight:800,width:60}}>TR.</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'#fff8',fontWeight:700,width:80}}>AUTO</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'#fff8',fontWeight:700,width:90}}>OSTATNIA</th>
            <th style={{padding:'10px 8px',textAlign:'center',fontSize:11,color:'#fff',fontWeight:800,width:60}}></th>
          </tr>
        </thead>
        <tbody>
          {clientList.map((cl,i)=>{
            const effCat=cl.cat||cl.autoCat;
            const isManual=!!cl.cat;
            const isNew=cl.szt===0;
            return<tr key={cl.name} style={{background:i%2?'#fafafa':'#fff',borderBottom:'1px solid #f3f0e8'}}>
              <td style={{padding:'8px 14px',fontSize:12,fontWeight:700}}>
                {cl.name}
                {isNew&&<span style={{marginLeft:6,background:'var(--g)',color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:8,fontWeight:800}}>NOWY</span>}
                {isManual&&<span style={{marginLeft:6,background:'#ffe082',color:'#5d4037',borderRadius:4,padding:'1px 6px',fontSize:8,fontWeight:800}}>RĘCZNY</span>}
              </td>
              <td style={{padding:'6px 8px',textAlign:'center'}}>
                <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                  {[['WR','🐽 WR','#e65100'],['TK','🐷 TK','#5d4037']].map(([k,l,col])=>
                    <button key={k} onClick={()=>setCat(cl.name,k)}
                      style={{padding:'6px 14px',borderRadius:6,border:effCat===k?'2px solid '+col:'1px solid var(--brd)',
                        background:effCat===k?col:'#fff',color:effCat===k?'#fff':col,
                        fontSize:11,fontWeight:800,cursor:'pointer',transition:'all .15s',
                        opacity:effCat===k?1:0.6}}>
                      {l}
                    </button>
                  )}
                </div>
              </td>
              <td style={{textAlign:'center',padding:'6px 8px'}}>
                <span className="m" style={{fontSize:13,fontWeight:800,color:cl.szt?'var(--gd)':'#ccc'}}>{cl.szt?fN(cl.szt):'—'}</span>
              </td>
              <td style={{textAlign:'center',padding:'6px 8px'}}>
                <span className="m" style={{fontSize:12,fontWeight:700,color:cl.cnt?'var(--mut)':'#ccc'}}>{cl.cnt||'—'}</span>
              </td>
              <td style={{textAlign:'center',padding:'6px 8px',fontSize:9,color:'var(--sub)'}}>
                {cl.autoCat==='WR'?'🐽':'🐷'} {cl.autoCat}
                <div style={{fontSize:8,color:'#ccc'}}>WBC:{cl.wbc} Ż:{cl.zywa}</div>
              </td>
              <td style={{textAlign:'center',padding:'6px 8px',fontSize:10,color:'var(--mut)',fontFamily:"'JetBrains Mono',monospace"}}>{cl.lastD||'—'}</td>
              <td style={{textAlign:'center',padding:'6px 8px'}}>
                {isManual&&<button onClick={()=>removeCl(cl.name)} title="Usuń ręczne przypisanie (wróci do auto)"
                  style={{background:'#fff3e0',border:'1px solid #ffe082',borderRadius:4,padding:'3px 8px',fontSize:9,fontWeight:700,color:'#e65100',cursor:'pointer'}}>
                  ↩ Auto
                </button>}
