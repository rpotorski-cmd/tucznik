<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KABANEK — Planer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f2ec;--card:#fff;--brd:#e5e1d8;--brd2:#d5d0c5;
  --txt:#1a1a1a;--mut:#999;--sub:#bbb;
  --g:#2d7a3a;--gd:#1e5c28;--gl:#e8f5e9;
  --r:#c62828;--rl:#fef2f2;
  --b:#1565c0;--bl:#e3f2fd;
  --a:#d97706;--al:#fffbeb;
  --gld:#c5a55a;--gldl:#fdf6e3;
  --rad:10px;--sh:0 1px 3px rgba(0,0,0,.05);
}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);line-height:1.4}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--g)40;border-radius:3px}
input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.m{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer}
table{width:100%;border-collapse:collapse}

/* API Loading & Status */
.api-loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.api-spinner{width:60px;height:60px;border:6px solid var(--brd);border-top-color:var(--g);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.api-status{position:fixed;top:12px;right:12px;padding:8px 15px;border-radius:20px;font-size:11px;font-weight:700;background:var(--gl);color:var(--g);border:1px solid var(--g);box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:9998;}
.api-status.error{background:var(--rl);color:var(--r);border-color:var(--r);}
</style>
</head>
<body>
<div id="api-loading" class="api-loading">
  <div class="api-spinner"></div>
  <div style="font-size:18px;font-weight:800;color:var(--g);margin-bottom:8px;">
    🐷 Ładowanie KABANEK...
  </div>
  <div style="font-size:12px;color:var(--mut);" id="api-status-text">
    Łączenie z API...
  </div>
</div>
<div id="api-status" class="api-status" style="display:none;">🟢 API</div>

<div id="root"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   🌐 KABANEK API WRAPPER - Auto localStorage → API conversion
   ═══════════════════════════════════════════════════════════ */

// CONFIGURATION - CHANGE THIS!
const API_BASE_URL = 'https://crm-gospodarstwo-production.up.railway.app/api';
// Example: 'https://kabanek-backend-production.up.railway.app/api'

console.log('%c🔗 KABANEK API:', 'color: #2d7a3a; font-weight: bold', API_BASE_URL);

// API Client
class KabanekAPI {
  constructor(baseURL) {
    this.baseURL = baseURL;
  }

  async request(endpoint, options = {}) {
    const url = `${this.baseURL}${endpoint}`;
    const response = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...options.headers },
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
    return data.data || data;
  }

  // CLIENTS
  async getClients() {
    const data = await this.request('/clients');
    const clientDb = {};
    data.forEach(c => { clientDb[c.id] = { name: c.name }; });
    return clientDb;
  }

  async createClient(name) {
    return await this.request('/clients', {
      method: 'POST',
      body: JSON.stringify({ name }),
    });
  }

  // SALES
  async getSales() {
    const data = await this.request('/sales');
    return data.map(s => ({
      id: s.id,
      c: s.client_id,
      d: s.date,
      q: s.quantity,
      wg: s.avg_weight,
      cr: s.farmer_price,
      cz: s.factory_price,
      cH: s.trade_premium || 0,
      no: s.notes || '',
      t: 'WBC',
      pe: 'Marek',
      aut: Math.ceil(s.quantity / 40),
      kg: s.quantity * s.avg_weight
    }));
  }

  async createSale(sale) {
    const result = await this.request('/sales', {
      method: 'POST',
      body: JSON.stringify({
        client_id: sale.c,
        date: sale.d,
        quantity: sale.q,
        avg_weight: sale.wg,
        farmer_price: sale.cr,
        factory_price: sale.cz,
        trade_premium: sale.cH || 0,
        notes: sale.no || ''
      }),
    });
    return {
      id: result.id,
      c: result.client_id,
      d: result.date,
      q: result.quantity,
      wg: result.avg_weight,
      cr: result.farmer_price,
      cz: result.factory_price,
      cH: result.trade_premium,
      no: result.notes,
      t: sale.t || 'WBC',
      pe: sale.pe || 'Marek',
      aut: Math.ceil(result.quantity / 40),
      kg: result.quantity * result.avg_weight
    };
  }

  async deleteSale(id) {
    return await this.request(`/sales/${id}`, { method: 'DELETE' });
  }

  // DELIVERIES
  async getDeliveries() {
    const data = await this.request('/deliveries');
    return data.map(d => ({
      id: d.id,
      c: d.client_id,
      d: d.date,
      q: d.quantity,
      wg: d.avg_weight,
      cp: d.price,
      no: d.notes || ''
    }));
  }

  async createDelivery(delivery) {
    return await this.request('/deliveries', {
      method: 'POST',
      body: JSON.stringify({
        client_id: delivery.c,
        date: delivery.d,
        quantity: delivery.q,
        avg_weight: delivery.wg,
        price: delivery.cp,
        notes: delivery.no || ''
      }),
    });
  }

  async deleteDelivery(id) {
    return await this.request(`/deliveries/${id}`, { method: 'DELETE' });
  }

  async health() {
    try {
      const data = await this.request('/health');
      return data.success || data.status === 'OK';
    } catch {
      return false;
    }
  }
}

const api = new KabanekAPI(API_BASE_URL);

// Global data store
window.__KABANEK_DATA__ = {
  sales: [],
  deliveries: [],
  clientDb: {},
  plans: {},
  reported: [],
  loaded: false
};

// Initialize from API
async function initKabanekAPI() {
  console.log('📥 Loading from API...');
  try {
    const [sales, deliveries, clientDb] = await Promise.all([
      api.getSales(),
      api.getDeliveries(),
      api.getClients()
    ]);
    
    window.__KABANEK_DATA__.sales = sales;
    window.__KABANEK_DATA__.deliveries = deliveries;
    window.__KABANEK_DATA__.clientDb = clientDb;
    window.__KABANEK_DATA__.plans = JSON.parse(localStorage.getItem('plans') || '{}');
    window.__KABANEK_DATA__.reported = JSON.parse(localStorage.getItem('reported') || '[]');
    window.__KABANEK_DATA__.loaded = true;
    
    console.log('✅ API data loaded:', { sales: sales.length, deliveries: deliveries.length, clients: Object.keys(clientDb).length });
  } catch (error) {
    console.error('❌ API init failed:', error);
    throw error;
  }
}


</script>

<script type="text/babel">
const {useState,useMemo,useRef,useEffect}=React;

/* ─── NORMALIZACJA ─── */
function normTr(t){
  t=(t||'').toUpperCase().trim();
  if(!t||t.includes('ZAKŁAD')||t.includes('ZAKLAD')||t.includes('ZAKŁA')||t.includes('ZAKŁD')||t==='ZA2AD'||t==='ZKŁAD')return'ZAKŁAD';
  if(t.includes('MARZEC')||t==='MAREC'||t==='MAREZC')return'MARZEC';
  if(t.includes('TYSZKO')||t==='TYSKO'||t==='TYZKO'||t==='TYSZK'||t.includes('TYSZZKO'))return'TYSZKO';
  if(t.includes('BULTRANS')||t==='BULTRAS')return'BULTRANS';
  if(t.includes('SOKOŁÓW')||t.includes('SOKOŁOW')||t.includes('SOKOLÓW'))return'SOKOŁÓW LOG.';
  if(t.includes('AGRO')||t==='AGRMURSY')return'AGROMURSY';
  if(t.includes('WIŚNIEWSKI')||t.includes('WISNIEW'))return'WIŚNIEWSKI';
  if(t.includes('TARNO'))return'TARNOGRODZKI';
  if(t.includes('NASZ')||t.includes('KABANEK'))return'NASZ TRANSPORT';
  if(t.includes('PRZYBYŁ'))return'PRZYBYŁ';if(t.includes('RADO'))return'RADO';
  if(t.includes('MARIO'))return'MARIO-EXPRES';if(t.includes('KOTYLA'))return'KOTYLA';
  if(t.includes('FABIAŃ'))return'FABIAŃSKI';if(t.includes('SAWIC'))return'SAWICKI';
  if(t.includes('MORAW'))return'MORAWSKI';if(t.includes('TUŁACZ'))return'TUŁACZ';
  return t;
}
function cap(s){return s?s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '):''}
function fP(v){return v.toFixed(2).replace('.',',')}
function fN(v){return Math.round(v).toLocaleString('pl')}

const UB_WBC=['RYTEL','ZAKRZEWSCY','GOODVALLEY','SOKOŁÓW','DOBROWOLSCY','GOBARTO','LASKOPOL','KASEK','AGROHANDEL','GETMOR','MARCINKOWSCY','ANIMEX KUTNO','ŁUKÓW','SKIBA','JUTAR'];
const UB_ZYWA=['TETRAGON','STAROPOLSKA','AMANOWICZ','SOMIANKA','KLINICKI','CEZAR','BIOVELA','ŚWIDERSKI','KONIAREK','LITWA','ANIOŁKOWSCY','DZIEKOŃŚKI','KOTYLA','TOCICKI','MIESROL','PROSIACZEK','CZYŻEW'];
const ALL_UB=[...UB_WBC.map(n=>({n,t:'WBC'})),...UB_ZYWA.map(n=>({n,t:'Żywa'}))];
const PE_COL={Marek:'#1565c0',Klaudia:'#9c27b0',Robert:'#e65100','Marek/Klaudia':'#00695c'};
const DN=['Ndz','Pon','Wt','Śr','Czw','Pt','Sob'];
const MS=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const MS_S=['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'];

function getMon(d){const x=new Date(d),dy=x.getDay();return new Date(x.getFullYear(),x.getMonth(),x.getDate()-dy+(dy===0?-6:1));}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getRange(mon,p){
  if(p==='week')return[fmt(mon),fmt(addD(mon,6))];
  if(p==='month'){const y=mon.getFullYear(),m=mon.getMonth();return[fmt(new Date(y,m,1)),fmt(new Date(y,m+1,0))];}
  return[mon.getFullYear()+'-01-01',mon.getFullYear()+'-12-31'];
}

/* ─── REUSABLE COMPONENTS ─── */
const Card=({children,style,...p})=><div style={{background:'var(--card)',borderRadius:'var(--rad)',border:'1px solid var(--brd)',boxShadow:'var(--sh)',overflow:'hidden',...style}} {...p}>{children}</div>;

function getWeekNum(d){const t=new Date(d);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const y=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-y)/864e5-3+(y.getDay()+6)%7)/7);}

function SalesView({allSales,gran,trCost=0.10}){
  const [viewBy,setViewBy]=React.useState('ubojnia');
  const [typeF,setTypeF]=React.useState('all');

  const sales=typeF==='WBC'?allSales.filter(s=>s.t==='WBC'):typeF==='Żywa'?allSales.filter(s=>s.t==='Żywa'):allSales;

  const calcZ=(x)=>{
    if(!(x.cz>0&&x.cr>0&&x.cr<50))return null;
    const trKg=x.isZ?0:trCost;
    const fp=x.cz*0.001;
    const fo=x.cz*0.00125;
    return x.cz-x.cr-trKg-fp-fo;
  };

  // Build time columns based on granularity
  const cols=React.useMemo(()=>{
    if(!sales.length) return[];
    const dates=sales.map(s=>s.d).sort();
    const first=dates[0],last=dates[dates.length-1];

    if(gran==='week'){
      const ws=[];
      let d=getMon(new Date(first));
      const end=new Date(last);
      while(d<=end){
        const s=fmt(d),e=fmt(addD(d,6));
        const wn=getWeekNum(d);
        const m=d.getMonth();
        ws.push({s,e,l:'T'+wn,sub:MS_S[m],key:s});
        d=addD(d,7);
      }
      return ws;
    }
    if(gran==='month'){
      const ms=[];
      const fy=parseInt(first.slice(0,4)),fm=parseInt(first.slice(5,7));
      const ly=parseInt(last.slice(0,4)),lm=parseInt(last.slice(5,7));
      let y=fy,m=fm;
      while(y<ly||(y===ly&&m<=lm)){
        const s=y+'-'+String(m).padStart(2,'0')+'-01';
        const e=y+'-'+String(m).padStart(2,'0')+'-31';
        ms.push({s,e,l:MS_S[m-1],sub:String(y),key:y+'-'+String(m).padStart(2,'0')});
        m++;if(m>12){m=1;y++;}
      }
      return ms;
    }
    // year
    const ys=[];
    const fy=parseInt(first.slice(0,4)),ly=parseInt(last.slice(0,4));
    for(let y=fy;y<=ly;y++){
      ys.push({s:y+'-01-01',e:y+'-12-31',l:String(y),sub:'',key:String(y)});
    }
    return ys;
  },[sales,gran]);

  // Build rows (by ubojnia or by client)
  const rows=React.useMemo(()=>{
    const m={};
    sales.forEach(s=>{
      const z=calcZ(s);
      const kg=s.kg||s.q*130;
      // For 'osoba' view, split Marek/Klaudia into individual persons
      if(viewBy==='osoba'&&s.pe.includes('/')){
        s.pe.split('/').forEach(p=>{
          const key=p.trim();
          if(!m[key])m[key]={name:key,type:s.t,total:0,kg:0,cnt:0,vals:{},persons:{},sprzR:0,sprzZ:0,costTr:0,costFP:0,costFO:0,zysk:0,cntZ:0,cntOk:0,cntLoss:0};
          const r=m[key];r.total+=s.q;r.kg+=kg;r.cnt++;
          if(s.cr>0)r.sprzR+=s.cr*kg; if(s.cz>0)r.sprzZ+=s.cz*kg;
          const trKg=s.isZ?0:trCost; r.costTr+=trKg*kg;
          if(s.cz>0){r.costFP+=s.cz*0.001*kg;r.costFO+=s.cz*0.00125*kg;}
          if(z!==null){r.cntZ++;r.zysk+=z*kg;if(z>=0)r.cntOk++;else r.cntLoss++;}
          cols.forEach(c=>{if(s.d>=c.s&&s.d<=c.e){r.vals[c.key]=(r.vals[c.key]||0)+s.q;}});
        });
      }else{
        const key=viewBy==='ubojnia'?s.s:viewBy==='klient'?s.c:viewBy==='transport'?s.tr:s.pe;
        if(!m[key])m[key]={name:key,type:s.t,total:0,kg:0,cnt:0,vals:{},persons:{},sprzR:0,sprzZ:0,costTr:0,costFP:0,costFO:0,zysk:0,cntZ:0,cntOk:0,cntLoss:0};
        const r=m[key];r.total+=s.q;r.kg+=kg;r.cnt++;
        if(s.cr>0)r.sprzR+=s.cr*kg; if(s.cz>0)r.sprzZ+=s.cz*kg;
        const trKg=s.isZ?0:trCost; r.costTr+=trKg*kg;
        if(s.cz>0){r.costFP+=s.cz*0.001*kg;r.costFO+=s.cz*0.00125*kg;}
        if(z!==null){r.cntZ++;r.zysk+=z*kg;if(z>=0)r.cntOk++;else r.cntLoss++;}
        cols.forEach(c=>{if(s.d>=c.s&&s.d<=c.e){r.vals[c.key]=(r.vals[c.key]||0)+s.q;}});
        if(viewBy!=='osoba') r.persons[s.pe]=(r.persons[s.pe]||0)+s.q;
      }
    });
    // Compute avgZyskKg per row
    Object.values(m).forEach(r=>{r.avgZyskKg=r.kg>0?r.zysk/r.kg:0;r.avgCr=r.kg>0?r.sprzR/r.kg:0;r.avgCz=r.kg>0?r.sprzZ/r.kg:0;});
    return Object.values(m).sort((a,b)=>b.total-a.total);
  },[sales,cols,viewBy,trCost]);

  const colTotals=cols.map(c=>rows.reduce((s,r)=>s+(r.vals[c.key]||0),0));
  const grandTotal=rows.reduce((s,r)=>s+r.total,0);
  const maxRow=rows.length?rows[0].total:1;

  // Financial totals
  const finTot=React.useMemo(()=>{
    const t={sprzR:0,sprzZ:0,costTr:0,costFP:0,costFO:0,zysk:0,kg:0,cntZ:0,cntOk:0,cntLoss:0};
    rows.forEach(r=>{t.sprzR+=r.sprzR;t.sprzZ+=r.sprzZ;t.costTr+=r.costTr;t.costFP+=r.costFP;t.costFO+=r.costFO;t.zysk+=r.zysk;t.kg+=r.kg;t.cntZ+=r.cntZ;t.cntOk+=r.cntOk;t.cntLoss+=r.cntLoss;});
    t.avgZyskKg=t.kg>0?t.zysk/t.kg:0;
    return t;
  },[rows]);

  // Summary stats
  const totQ=sales.reduce((s,x)=>s+x.q,0);
  const totKg=sales.reduce((s,x)=>s+(x.kg||x.q*130),0);
  const wbcQ=sales.filter(s=>s.t==='WBC').reduce((s,x)=>s+x.q,0);
  const zywaQ=sales.filter(s=>s.t==='Żywa').reduce((s,x)=>s+x.q,0);
  const ubCnt=new Set(sales.map(s=>s.s)).size;
  const clCnt=new Set(sales.map(s=>s.c)).size;

  // Mini chart data (last cols)
  const chartCols=cols.slice(-12);
  const chartMax=chartCols.length?Math.max(...chartCols.map(c=>colTotals[cols.indexOf(c)]||0),1):1;

  return<div>
    {/* Summary cards */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:8,marginBottom:12}}>
      <Card style={{padding:'10px 14px',borderLeft:'4px solid var(--g)'}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--g)'}}>📦 SPRZEDAŻ</div>
        <div className="m" style={{fontSize:24,fontWeight:900,color:'var(--g)'}}>{fN(totQ)}</div>
        <div style={{fontSize:9,color:'var(--mut)'}}>szt. · {fN(Math.round(totKg/1000))}t</div>
      </Card>
      <Card style={{padding:'10px 14px',borderLeft:'4px solid var(--b)'}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--b)'}}>🔵 WBC</div>
        <div className="m" style={{fontSize:20,fontWeight:900,color:'var(--b)'}}>{fN(wbcQ)}</div>
        <div style={{fontSize:9,color:'var(--mut)'}}>{totQ>0?Math.round(wbcQ/totQ*100):0}%</div>
      </Card>
      <Card style={{padding:'10px 14px',borderLeft:'4px solid var(--g)'}}>

/* ════════════════════════════════════════════════════════
   PLANER — oś czasu: historia + planowanie tygodniowe
   ════════════════════════════════════════════════════════ */
const SZT_PER_AUT=170;

function Planner({allSales,plans,setPlans}){
  const today=new Date();
  const curWk=getMon(today);
  const [offset,setOffset]=React.useState(0);
  const [edit,setEdit]=React.useState(null); // {ub, wk}
  const [search,setSearch]=React.useState('');
  const WEEKS_SHOW=8;

  const weeks=React.useMemo(()=>{
    const ws=[];
    const startWk=addD(curWk,(offset-3)*7);
    for(let i=0;i<WEEKS_SHOW;i++){
      const mon=addD(startWk,i*7);
      const s=fmt(mon),e=fmt(addD(mon,6));
      const isPast=addD(mon,6)<today;
      const isCur=fmt(mon)===fmt(curWk);
      const isFut=mon>today;
      ws.push({mon,s,e,key:s,isPast,isCur,isFut,wn:getWeekNum(mon),
        mLabel:MS_S[mon.getMonth()]+' '+mon.getFullYear(),
        dLabel:mon.getDate()+'.'+String(mon.getMonth()+1).padStart(2,'0')+'–'+addD(mon,6).getDate()+'.'+String(addD(mon,6).getMonth()+1).padStart(2,'0')});
    }
    return ws;
  },[offset]);

  const realData=React.useMemo(()=>{
    const m={};
    allSales.forEach(s=>{
      const wMon=getMon(new Date(s.d));
      const wk=fmt(wMon);
      const k=s.s+'|'+wk;
      if(!m[k])m[k]={szt:0,aut:0,clients:new Set()};
      m[k].szt+=s.q;m[k].clients.add(s.c);
    });
    Object.values(m).forEach(v=>{v.aut=Math.max(1,Math.round(v.szt/SZT_PER_AUT));v.clients=v.clients.size;});
    return m;
  },[allSales]);

  const getPlan=(ub,wk)=>(plans[wk]&&plans[wk][ub])||{aut:'',szt:'',pe:'',cp:'',typ:'',str:''};
  const setPlanField=(ub,wk,field,val)=>{
    setPlans(prev=>{
      const w={...(prev[wk]||{})};
      const cell={...(w[ub]||{aut:'',szt:'',pe:'',cp:'',typ:'',str:''})};
      cell[field]=val;
      if(field==='aut'&&val){cell.szt=String(Math.round(parseInt(val)*SZT_PER_AUT));}
      else if(field==='szt'&&val){cell.aut=String(Math.max(1,Math.ceil(parseInt(val)/SZT_PER_AUT)));}
      if(field==='typ'&&val==='W'){cell.str='';}
      if(!cell.aut&&!cell.szt&&!cell.pe&&!cell.cp&&!cell.typ)delete w[ub]; else w[ub]=cell;
      return{...prev,[wk]:w};
    });
  };

  const activeUb=React.useMemo(()=>{
    const set=new Set();
    allSales.forEach(s=>set.add(s.s));
    weeks.forEach(w=>{if(plans[w.key])Object.keys(plans[w.key]).forEach(k=>set.add(k));});
    const byQ={};allSales.forEach(s=>{byQ[s.s]=(byQ[s.s]||0)+s.q;});
    // Classify UB as WBC or Żywa based on majority of transactions in data
    const ubType={};
    allSales.forEach(s=>{
      if(!ubType[s.s])ubType[s.s]={wbc:0,zywa:0};
      if(s.t==='WBC')ubType[s.s].wbc+=s.q; else ubType[s.s].zywa+=s.q;
    });
    const wbc=[...set].filter(n=>{const u=ubType[n];return u?u.wbc>=u.zywa:UB_WBC.includes(n);}).sort((a,b)=>(byQ[b]||0)-(byQ[a]||0));
    const zywa=[...set].filter(n=>{const u=ubType[n];return u?u.zywa>u.wbc:UB_ZYWA.includes(n);}).sort((a,b)=>(byQ[b]||0)-(byQ[a]||0));
    return{wbc,zywa};
  },[weeks,realData,plans,allSales]);

  const filtUb=React.useMemo(()=>{
    const q=search.toUpperCase().trim();
    if(!q)return activeUb;
    return{wbc:activeUb.wbc.filter(u=>u.toUpperCase().includes(q)),zywa:activeUb.zywa.filter(u=>u.toUpperCase().includes(q))};
  },[activeUb,search]);

  const weekTotals=weeks.map(w=>{
    let szt=0,aut=0;
    [...activeUb.wbc,...activeUb.zywa].forEach(ub=>{
      const rd=realData[ub+'|'+w.key];
      const pl=getPlan(ub,w.key);
      if(w.isPast&&rd){szt+=rd.szt;aut+=rd.aut;}
      else if(!w.isPast){szt+=parseInt(pl.szt)||0;aut+=parseInt(pl.aut)||0;}
    });
    return{szt,aut};
  });
  const maxWkSzt=Math.max(...weekTotals.map(t=>t.szt),1);

  const isEd=(ub,wk)=>edit&&edit.ub===ub&&edit.wk===wk;

  // Compact table cell
  const Cell=({ub,w})=>{
    const rd=realData[ub+'|'+w.key];
    const pl=getPlan(ub,w.key);
    const sel=isEd(ub,w.key);

    if(w.isPast){
      if(!rd) return<td style={{padding:2,textAlign:'center',background:'#fafaf8',borderRight:'1px solid #f0ede5'}}>
        <span className="m" style={{fontSize:10,color:'#ddd'}}>—</span>
      </td>;
      return<td style={{padding:2,borderRight:'1px solid #f0ede5'}}>
        <div style={{background:'#f0f7f0',borderRadius:6,padding:'4px 2px',textAlign:'center',border:'1px solid #c8e6c9'}}>
          <div className="m" style={{fontSize:14,fontWeight:900,color:'var(--gd)'}}>{rd.szt}</div>
          <div style={{fontSize:8,color:'var(--g)',fontWeight:700}}>🚛{rd.aut}</div>
        </div>
      </td>;
    }

    const hasPlan=pl.aut||pl.szt||pl.cp||pl.typ;
    const hasReal=rd&&rd.szt>0;
    return<td style={{padding:2,background:w.isCur?'var(--g)08':'#fffdf5',borderRight:'1px solid '+(w.isCur?'var(--g)20':'#f5f0e0'),
      borderLeft:w.isCur?'2px solid var(--g)':''}}>
      {hasReal&&<div style={{background:'#e8f5e9',borderRadius:5,padding:'2px',textAlign:'center',marginBottom:2,border:'1px solid #a5d6a7'}}>
        <span className="m" style={{fontSize:12,fontWeight:900,color:'var(--gd)'}}>✓{rd.szt}</span>
        <span style={{fontSize:7,color:'var(--g)',marginLeft:3}}>🚛{rd.aut}</span>
      </div>}
      <div onClick={()=>setEdit(sel?null:{ub,wk:w.key})}
        style={{background:sel?'#fff3e0':hasPlan?'#fffde7':'#fff',
          border:sel?'2px solid var(--a)':'1px '+(hasPlan?'solid #ffe082':'dashed #e0dcc8'),
          borderRadius:6,padding:'4px 2px',textAlign:'center',cursor:'pointer',
          minHeight:hasReal?28:42,transition:'all .15s',
          boxShadow:sel?'0 0 8px var(--a)40':'none'}}>
        {hasPlan?<>
          <div style={{display:'flex',justifyContent:'center',gap:6,alignItems:'baseline'}}>
            <span className="m" style={{fontSize:14,fontWeight:900,color:'var(--g)'}}>{pl.szt||'—'}</span>
            <span className="m" style={{fontSize:10,fontWeight:700,color:'#b8860b'}}>🚛{pl.aut||'—'}</span>
          </div>

/* ════════════════════════════════════════════════════════
   LISTA — transakcje z zyskiem/kg
   ════════════════════════════════════════════════════════ */
function TxList({sales,trCost,allSales,onAdd,clientDb={}}){
  const [page,setPage]=React.useState(0);
  const [search,setSearch]=React.useState('');
  const [sortBy,setSortBy]=React.useState('date');
  const [prowizje,setProwizje]=React.useState({});
  const setProw=(id,val)=>{
    const raw=val.replace(/[^0-9.,]/g,'').replace(',','.');
    setProwizje(p=>({...p,[id]:raw}));
  };
  const getProw=(id)=>{const v=prowizje[id];return v===undefined||v===''?0:parseFloat(v)||0;};
  /* Pre-fill wagaR from Excel kg data (r[10]) where available */
  const [wagaR,setWagaR]=React.useState(()=>{
    const init={};
    sales.forEach(s=>{
      const raw=window.__RAW__[s.id-1];
      if(raw&&raw[10]>0) init[s.id]=raw[10];
    });
    return init;
  });
  const [wagaZ,setWagaZ]=React.useState({});
  const perPage=40;

  const calcZ=(x)=>{
    if(!(x.cz>0&&x.cr>0&&x.cr<50))return null;
    const trKg=x.isZ?0:trCost;
    const fp=x.cz*0.001;
    const fo=x.cz*0.00125;
    return x.cz-x.cr-trKg-fp-fo;
  };

  const list=React.useMemo(()=>{
    let s=sales;
    if(search){const q=search.toUpperCase();s=s.filter(x=>x.c.toUpperCase().includes(q)||x.s.includes(q)||x.tr.includes(q));}
    if(sortBy==='date')s=[...s].sort((a,b)=>b.d.localeCompare(a.d));
    else if(sortBy==='zysk')s=[...s].sort((a,b)=>(calcZ(b)||0)-(calcZ(a)||0));
    else if(sortBy==='strata')s=[...s].sort((a,b)=>(calcZ(a)||0)-(calcZ(b)||0));
    else if(sortBy==='qty')s=[...s].sort((a,b)=>b.q-a.q);
    return s;
  },[sales,search,sortBy,trCost]);

  /* ── PODSUMOWANIE FINANSOWE ── */
  const fin=React.useMemo(()=>{
    let totalKg=0, totalSzt=0, sprzR=0, sprzZ=0, costTr=0, costFP=0, costFO=0, cntZ=0, cntOk=0, cntLoss=0, totalProw=0;
    let kgWithWaga=0, kgWithoutWaga=0;
    sales.forEach(s=>{
      const kg=s.kg||s.q*130;
      totalKg+=kg; totalSzt+=s.q;
      if(s.cr>0) sprzR+=s.cr*kg;
      if(s.cz>0) sprzZ+=s.cz*kg;
      const trKg=s.isZ?0:trCost;
      costTr+=trKg*kg;
      if(s.cz>0){costFP+=s.cz*0.001*kg; costFO+=s.cz*0.00125*kg;}

      // waga stats

      if(raw&&raw[10]>0) kgWithWaga+=raw[10]; else kgWithoutWaga+=kg;
    });
    const zysk=sprzZ-sprzR-costTr-costFP-costFO-totalProw;
    const avgZyskKg=totalKg>0?zysk/totalKg:0;
    return {totalKg,totalSzt,sprzR,sprzZ,costTr,costFP,costFO,totalProw,zysk,avgZyskKg,cnt:sales.length,cntZ,cntOk,cntLoss,kgWithWaga,kgWithoutWaga};

              </Td>
              {(()=>{const prow=getProw(s.id);const prowPerKg=kg>0?(prow*s.q)/kg:0;const zyskFinal=zysk!==null?zysk-prowPerKg:null;const okF=zyskFinal!==null&&zyskFinal>=0;const zyskTotal=zyskFinal!==null?zyskFinal*kg:null;return<><Td className="m" style={{textAlign:'center',fontWeight:800,fontSize:14,color:zyskFinal===null?'var(--sub)':okF?'var(--g)':'var(--r)',background:zyskFinal===null?'':(okF?'#f0fdf0':'#fef2f2')}}>{zyskFinal!==null?(okF?'+':'')+fP(zyskFinal):'—'}</Td><Td className="m" style={{textAlign:'center',fontWeight:800,fontSize:13,color:zyskTotal===null?'var(--sub)':zyskTotal>=0?'var(--g)':'var(--r)',background:zyskTotal===null?'':(zyskTotal>=0?'#e8f5e9':'#ffebee'),borderLeft:'2px solid #a5d6a7'}}>{zyskTotal!==null?(zyskTotal>=0?'+':'')+fN(Math.round(zyskTotal))+'zł':'—'}</Td></>})()}
